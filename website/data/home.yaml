# Language-neutral structure for the home page. Copy lives in i18n/*.yaml,
# keyed by these `key` values (e.g. home_phase_headstart_title, home_role_prey_name).

# Timing panels in the "Hunt or be Hunted" section.
phases:
  - key: headstart
    value: "10"
    unit: min
    accent: signal
  - key: active
    value: "~45"
    unit: min
    accent: signal
  - key: final
    value: "5"
    unit: min
    accent: caution

# Role cards in the "Every Player Has a Job" section.
roles:
  - key: prey
    glyph: "◎"
    variant: prey
    url: /roles/prey/
  - key: hunter
    glyph: "⬤"
    variant: hunter
    url: /roles/hunter/
  - key: creator
    glyph: "◈"
    variant: hunter
    url: /roles/game-creator/
