color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">End of <span style=\"color:#ff2f1f;text-shadow:0 0 16px rgba(255,47,31,.4);\">Game<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:24px;color:#8c9a83;\">When the timer hits zero or the last prey is tagged, the map fades and the verdict takes the screen. One big outcome line, three stat readouts, the final roster, and the two ways forward.<\u002Fp>\n\n        <div style=\"display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n            <div style=\"font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#5a6553;\">Results — Hunters Win<\u002Fdiv>\n            <div style=\"width:300px;height:600px;border:1.5px solid #39402f;border-radius:36px;overflow:hidden;position:relative;background:radial-gradient(700px 420px at 50% -8%, rgba(255,47,31,.08), transparent 60%), #0c0e0c;\">\n              <span style=\"position:absolute;top:10px;left:10px;width:14px;height:14px;border:1.5px solid #a01408;border-right:0;border-bottom:0;\"><\u002Fspan>\n              <span style=\"position:absolute;top:10px;right:10px;width:14px;height:14px;border:1.5px solid #a01408;border-left:0;border-bottom:0;\"><\u002Fspan>\n              <span style=\"position:absolute;bottom:10px;left:10px;width:14px;height:14px;border:1.5px solid #a01408;border-right:0;border-top:0;\"><\u002Fspan>\n              <span style=\"position:absolute;bottom:10px;right:10px;width:14px;height:14px;border:1.5px solid #a01408;border-left:0;border-top:0;\"><\u002Fspan>\n              <div style=\"position:absolute;inset:0;overflow-y:auto;padding:44px 22px 24px;display:flex;flex-direction:column;\">\n                <div style=\"font-size:10px;letter-spacing:3px;color:#a01408;text-transform:uppercase;margin-bottom:14px;\">Transmission Ended<\u002Fdiv>\n                <div style=\"font-family:'Special Elite',monospace;font-size:42px;line-height:.95;color:#ff2f1f;text-shadow:0 0 24px rgba(255,47,31,.4);margin-bottom:8px;\">HUNTERS<br>WIN<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8c9a83;margin-bottom:28px;\">All prey tagged with 02:13 to spare.<\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;border:1px solid #39402f;border-radius:3px;overflow:hidden;margin-bottom:24px;\">\n                  <div style=\"background:#0c0e0c;padding:12px 8px;text-align:center;border-right:1px solid #39402f;\"><div style=\"font-family:'Special Elite',monospace;font-size:22px;color:#dcf6d2;\">17:47<\u002Fdiv><div style=\"font-size:8px;letter-spacing:1.5px;color:#5a6553;text-transform:uppercase;margin-top:4px;\">Duration<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:#0c0e0c;padding:12px 8px;text-align:center;border-right:1px solid #39402f;\"><div style=\"font-family:'Special Elite',monospace;font-size:22px;color:#ff2f1f;text-shadow:0 0 10px rgba(255,47,31,.4);\">3<\u002Fdiv><div style=\"font-size:8px;letter-spacing:1.5px;color:#5a6553;text-transform:uppercase;margin-top:4px;\">Tags<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:#0c0e0c;padding:12px 8px;text-align:center;\"><div style=\"font-family:'Special Elite',monospace;font-size:22px;color:#5a6553;\">0<\u002Fdiv><div style=\"font-size:8px;letter-spacing:1.5px;color:#5a6553;text-transform:uppercase;margin-top:4px;\">Survived<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:10px;\">Final Roster<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:28px;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #39402f;background:#0c0e0c;border-radius:3px;padding:9px 12px;position:relative;overflow:hidden;\"><span style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:#ff2f1f;\"><\u002Fspan><span style=\"font-family:'Special Elite',monospace;font-size:13px;color:#dcf6d2;\">REAPER<\u002Fspan><span style=\"font-size:9px;color:#5a6553;letter-spacing:1px;\">HUNTER<\u002Fspan><span style=\"margin-left:auto;font-size:9px;letter-spacing:1px;color:#ff2f1f;\">2 TAGS<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #39402f;background:#0c0e0c;border-radius:3px;padding:9px 12px;position:relative;overflow:hidden;opacity:.7;\"><span style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:#5a6553;\"><\u002Fspan><span style=\"font-family:'Special Elite',monospace;font-size:13px;color:#8c9a83;\">GHOST_07<\u002Fspan><span style=\"font-size:9px;color:#5a6553;letter-spacing:1px;\">PREY<\u002Fspan><span style=\"margin-left:auto;font-size:9px;letter-spacing:1px;color:#5a6553;\">TAGGED 12:30<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #39402f;background:#0c0e0c;border-radius:3px;padding:9px 12px;position:relative;overflow:hidden;opacity:.7;\"><span style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:#5a6553;\"><\u002Fspan><span style=\"font-family:'Special Elite',monospace;font-size:13px;color:#8c9a83;\">VIPER_11<\u002Fspan><span style=\"font-size:9px;color:#5a6553;letter-spacing:1px;\">PREY<\u002Fspan><span style=\"margin-left:auto;font-size:9px;letter-spacing:1px;color:#5a6553;\">TAGGED 15:34<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;gap:10px;margin-top:auto;\">\n                  <button style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:12px 0;border-radius:3px;border:1px solid #39402f;background:transparent;color:#8c9a83;cursor:pointer;\">Rematch<\u002Fbutton>\n                  <button style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:12px 0;border-radius:3px;border:1px solid #64ff00;background:#64ff00;color:#0c0e0c;cursor:pointer;transition:.18s;\" style-hover=\"box-shadow:0 0 24px rgba(100,255,0,.35);\">New Game<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;color:#8c9a83;max-width:220px;text-align:center;line-height:1.5;\">Outcome line carries the winning side's color. Tagged prey rows dim to 70% with a ghost role bar.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1;min-width:260px;\">\n            <div style=\"border-left:2px solid #a01408;padding:10px 16px;margin-bottom:18px;\"><div style=\"font-family:'Special Elite',monospace;font-size:13px;color:#dcf6d2;margin-bottom:6px;\">Verdict color<\u002Fdiv><div style=\"font-size:12px;color:#8c9a83;line-height:1.6;\">The outcome headline is the only place a full-size Special Elite line runs in a role color — <span style=\"color:#ff2f1f;\">red<\u002Fspan> when hunters win, <span style=\"color:#64ff00;\">green<\u002Fspan> when prey survive.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border-left:2px solid #1f4d00;padding:10px 16px;margin-bottom:18px;\"><div style=\"font-family:'Special Elite',monospace;font-size:13px;color:#dcf6d2;margin-bottom:6px;\">Stat readouts<\u002Fdiv><div style=\"font-size:12px;color:#8c9a83;line-height:1.6;\">Three cells reuse the HUD treatment — Special Elite numbers, ghost labels. Tags glow red; survivor count glows green when any prey lived.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border-left:2px solid #1f4d00;padding:10px 16px;\"><div style=\"font-family:'Special Elite',monospace;font-size:13px;color:#dcf6d2;margin-bottom:6px;\">Forward actions<\u002Fdiv><div style=\"font-size:12px;color:#8c9a83;line-height:1.6;\">Rematch (ghost, same squad &amp; settings) sits left; New Game (filled green, back to lobby) sits right — the same left-safe / right-committed rule as the modal.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <div id=\"sentinel\"><\u002Fdiv>\n\n      <p style=\"font-size:11px;color:#5a6553;border-top:1px dashed #39402f;padding-top:16px;margin-top:40px;letter-spacing:.5px;text-align:center;\">THE PREY // Design System v1.0 — END OF TRANSMISSION<\u002Fp>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    cp1:true, cp2:false, cp3:false, ch1:true, ch2:false, ch3:false,\n    modalOpen:false, seg:'hunter',\n    swSound:true, swVibrate:false, swGhost:true, radius:300, hudDemo:false,\n  };\n  tog(k){ return () => this.setState(s => ({ [k]: !s[k] })); }\n  renderVals(){\n    return {\n      navFoundations:[\n        {idx:'00',label:'Concept',href:'#concept'},\n        {idx:'01',label:'Color',href:'#color'},\n        {idx:'02',label:'Typography',href:'#type'},\n        {idx:'03',label:'Space & Tokens',href:'#space'},\n        {idx:'04',label:'Motion',href:'#motion'},\n        {idx:'05',label:'Voice & Tone',href:'#voice'},\n      ],\n      navSystem:[\n        {idx:'06',label:'Buttons',href:'#buttons'},\n        {idx:'07',label:'Status & Roles',href:'#status'},\n        {idx:'08',label:'Inputs',href:'#inputs'},\n        {idx:'09',label:'Alerts',href:'#alerts'},\n        {idx:'10',label:'Controls',href:'#controls'},\n        {idx:'11',label:'Modals',href:'#modals'},\n      ],\n      navGame:[\n        {idx:'12',label:'Radar',href:'#radar'},\n        {idx:'13',label:'HUD Panel',href:'#hud'},\n        {idx:'14',label:'Status Bar',href:'#statusbar'},\n        {idx:'15',label:'Map & Dots',href:'#map'},\n      ],\n      navPatterns:[\n        {idx:'16',label:'Prey Screens',href:'#prey'},\n        {idx:'17',label:'Hunter Screens',href:'#hunter'},\n        {idx:'18',label:'Lobby & Setup',href:'#lobby'},\n        {idx:'19',label:'Results',href:'#results'},\n      ],\n      principles:[\n        {num:'01',title:'Glanceable Over Beautiful',body:'A player reads the screen at a sprint. Critical state — your role, the nearest threat, time left — must register in under a second. Hierarchy beats decoration.'},\n        {num:'02',title:'Green Is Information, Not Wallpaper',body:'The signal green is the most precious pixel on screen. Reserve it for live, actionable data. If everything glows, nothing does.'},\n        {num:'03',title:'Two Sides, One System',body:'Prey and Hunter share the same instrument. Role is communicated through color and a single accent — never two different apps.'},\n        {num:'04',title:'The World Is The Canvas',body:'The map and radar are primary. Chrome is thin, dark, and recedes so the playfield dominates.'},\n      ],\n      surfaces:[\n        {name:'Void',hex:'#0C0E0C',role:'Map base, deepest insets, code/terminal fields.',bg:'#0c0e0c'},\n        {name:'Base',hex:'#181B17',role:'App background. The \"dark grey.\"',bg:'#181b17'},\n        {name:'Surface',hex:'#23271F',role:'Cards, sheets, panels.',bg:'#23271f'},\n        {name:'Surface +1',hex:'#2D3328',role:'Raised rows, pressed states.',bg:'#2d3328'},\n        {name:'Line',hex:'#39402F',role:'Borders, dividers, hairlines.',bg:'#39402f'},\n      ],\n      signals:[\n        {name:'Signal',hex:'#64FF00',role:'Primary actions, live data, brand. Hero color.',bg:'#64ff00'},\n        {name:'Signal Dim',hex:'#3F9E00',role:'Eyebrows, secondary accents, rings.',bg:'#3f9e00'},\n        {name:'Signal Deep',hex:'#1F4D00',role:'Radar grid, inactive tracks, faint glows.',bg:'#1f4d00'},\n      ],\n      roles:[\n        {name:'Prey / Safe',hex:'#64FF00',role:'You are hidden. Friendly markers.',bg:'#64ff00'},\n        {name:'Hunter / Threat',hex:'#FF2F1F',role:'Hunters, tagged, danger, eliminations.',bg:'#ff2f1f'},\n        {name:'Caution',hex:'#FFB300',role:'Low time, contested zones, warnings.',bg:'#ffb300'},\n        {name:'Info',hex:'#13E0C8',role:'Waypoints, neutral system, supply drops.',bg:'#13e0c8'},\n      ],\n      texts:[\n        {name:'Primary',hex:'#DCF6D2',role:'Headlines, key values on dark.',bg:'#dcf6d2'},\n        {name:'Soft',hex:'#8C9A83',role:'Body copy, descriptions.',bg:'#8c9a83'},\n        {name:'Ghost',hex:'#5A6553',role:'Labels, captions, disabled.',bg:'#5a6553'},\n      ],\n      typeScale:[\n        {tk:'Display',px:'86 / .92',ex:'STAY HIDDEN',font:\"'Special Elite',monospace\",size:'40px',ls:'1px',color:'#dcf6d2'},\n        {tk:'H1',px:'34 / 1.1',ex:'Mission Briefing',font:\"'Special Elite',monospace\",size:'28px',ls:'0',color:'#dcf6d2'},\n        {tk:'H2',px:'24 / 1.2',ex:'Nearest Threat',font:\"'Special Elite',monospace\",size:'22px',ls:'0',color:'#dcf6d2'},\n        {tk:'H3',px:'19 / 1.3',ex:'Active Players',font:\"'Special Elite',monospace\",size:'18px',ls:'.5px',color:'#64ff00'},\n        {tk:'Readout',px:'24 / 1.0',ex:'04:17',font:\"'Special Elite',monospace\",size:'24px',ls:'0',color:'#64ff00'},\n        {tk:'Body',px:'15 / 1.65',ex:'You are hidden. Keep moving.',font:\"'PT Mono',monospace\",size:'15px',ls:'0',color:'#dcf6d2'},\n        {tk:'Caption',px:'12 / 1.4',ex:'last ping 3s ago',font:\"'PT Mono',monospace\",size:'12px',ls:'0',color:'#8c9a83'},\n        {tk:'Label',px:'10 / 1.0',ex:'DISTANCE TO EDGE',font:\"'PT Mono',monospace\",size:'10px',ls:'2px',color:'#5a6553'},\n      ],\n      spaceTokens:[\n        {name:'space.xs',val:'4px',w:'4px'},\n        {name:'space.sm',val:'8px',w:'8px'},\n        {name:'space.md',val:'16px',w:'16px'},\n        {name:'space.lg',val:'24px',w:'24px'},\n        {name:'space.xl',val:'40px',w:'40px'},\n      ],\n      shapeTokens:[\n        {name:'radius',val:'3px',use:'Cards, buttons'},\n        {name:'radius.pill',val:'999px',use:'Status pills'},\n        {name:'border',val:'1px',use:'Hairlines'},\n        {name:'accent.bar',val:'3px',use:'Role markers'},\n        {name:'glow',val:'0 0 18px',use:'Signal halo'},\n      ],\n      motion:[\n        {name:'Radar sweep',dur:'3400ms loop',ease:'linear',trig:'Always, in-game'},\n        {name:'Blip ping',dur:'2000ms loop',ease:'ease-out',trig:'Tracked player'},\n        {name:'Button flare',dur:'180ms',ease:'ease',trig:'Press primary'},\n        {name:'Pill pulse',dur:'1500ms loop',ease:'ease-in-out',trig:'Live status'},\n        {name:'Threat flash',dur:'400ms ×3',ease:'ease',trig:'Hunter enters radius'},\n      ],\n      voiceDo:['\"You are hidden. Keep moving.\"','\"Hunter nearby. Break line of sight.\"','\"Signal lost. Find open sky.\"','\"Hunt begins in 00:10.\"'],\n      voiceDont:['\"Oops! We couldn\\u2019t find you \\uD83D\\uDE05\"','\"You might want to consider moving.\"','\"Error 403: location unavailable.\"','\"Welcome back, valued player!\"'],\n\n      // ---- interactive state ----\n      cp1:this.state.cp1, ep1:!this.state.cp1, toggleP1:this.tog('cp1'),\n      cp2:this.state.cp2, ep2:!this.state.cp2, toggleP2:this.tog('cp2'),\n      cp3:this.state.cp3, ep3:!this.state.cp3, toggleP3:this.tog('cp3'),\n      ch1:this.state.ch1, eh1:!this.state.ch1, toggleH1:this.tog('ch1'),\n      ch2:this.state.ch2, eh2:!this.state.ch2, toggleH2:this.tog('ch2'),\n      ch3:this.state.ch3, eh3:!this.state.ch3, toggleH3:this.tog('ch3'),\n      modalOpen:this.state.modalOpen, openModal:()=>this.setState({modalOpen:true}), closeModal:()=>this.setState({modalOpen:false}),\n      segPrey:this.state.seg==='prey', segHunter:this.state.seg==='hunter', setPrey:()=>this.setState({seg:'prey'}), setHunter:()=>this.setState({seg:'hunter'}),\n      swSound:this.state.swSound, swSoundOff:!this.state.swSound, toggleSound:this.tog('swSound'),\n      swVibrate:this.state.swVibrate, swVibrateOff:!this.state.swVibrate, toggleVibrate:this.tog('swVibrate'),\n      swGhost:this.state.swGhost, swGhostOff:!this.state.swGhost, toggleGhost:this.tog('swGhost'),\n      radius:this.state.radius, setRadius:(e)=>this.setState({radius:Number(e.target.value)}),\n      hudCollapsed:this.state.hudDemo, hudExpanded:!this.state.hudDemo, toggleHud:this.tog('hudDemo'),\n\n      // ---- spec data ----\n      preyThresholds:[\n        {dist:'\\u2265 100 m',label:'Safe',token:'--signal #64FF00',ex:'147 M',color:'#64ff00',glow:'rgba(100,255,0,.35)',sw:'#64ff00'},\n        {dist:'50 \\u2013 99 m',label:'Caution',token:'--caution #FFB300',ex:'63 M',color:'#ffb300',glow:'rgba(255,179,0,.35)',sw:'#ffb300'},\n        {dist:'< 50 m',label:'Danger',token:'--hunter #FF2F1F',ex:'11 M',color:'#ff2f1f',glow:'rgba(255,47,31,.4)',sw:'#ff2f1f'},\n      ],\n      hunterThresholds:[\n        {dist:'< 50 m',label:'In Range',token:'--signal #64FF00',ex:'22 M',color:'#64ff00',glow:'rgba(100,255,0,.35)',sw:'#64ff00'},\n        {dist:'50 \\u2013 100 m',label:'Approaching',token:'--caution #FFB300',ex:'72 M',color:'#ffb300',glow:'rgba(255,179,0,.35)',sw:'#ffb300'},\n        {dist:'> 100 m',label:'Tracking',token:'--text-ghost dim',ex:'187 M',color:'#5a6553',glow:'transparent',sw:'#5a6553'},\n      ],\n      timerStates:[\n        {phase:'Normal play',val:'14:12',color:'#64ff00',glow:'rgba(100,255,0,.35)',anim:'none',rule:'--signal green with standard glow. Static.'},\n        {phase:'Final stage (> 5 min left)',val:'04:22',color:'#ffb300',glow:'rgba(255,179,0,.35)',anim:'none',rule:'--caution yellow. \"FINAL STAGE\" micro-label appears above. Static value.'},\n        {phase:'Final stage (\\u2264 5 min left)',val:'02:51',color:'#ff2f1f',glow:'rgba(255,47,31,.4)',anim:'valueFlash 500ms ease-in-out infinite',rule:'--hunter red + 500ms flash loop. All four corner brackets switch to red.'},\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
