name: Games

on:
  push:
    branches: [main]
    paths:
      - 'src/Games/**'
      - 'src/Core/**'
      - 'src/Shared/**'
      - 'src/Aspire/ThePrey.Aspire.ServiceDefaults/**'
      - 'infra/games/**'
      - 'infra/modules/**'
      - '.github/workflows/games.yml'
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Image tag override (leave blank to use GitVersion semVer)'
        required: false
        default: ''
  pull_request:
    branches: [main]
    paths:
      - 'src/Games/**'
      - 'src/Core/**'
      - 'src/Shared/**'
      - 'src/Aspire/ThePrey.Aspire.ServiceDefaults/**'
      - 'infra/games/**'
      - 'infra/modules/**'
      - '.github/workflows/games.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: games-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version
    uses: ./.github/workflows/version.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run Games tests
        run: dotnet test src/Games/HexMaster.ThePrey.Games.Tests/HexMaster.ThePrey.Games.Tests.csproj --configuration Release

  publish:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: [version, test]
    if: github.event_name != 'pull_request'
    outputs:
      imageTag: ${{ steps.resolve-tag.outputs.imageTag }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve image tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.imageTag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.version.outputs.semVer }}"
          fi
          echo "imageTag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure (ACR)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ secrets.ACR_TENANT_ID }}
          subscription-id: ${{ secrets.ACR_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_HOSTNAME }}"

      - name: Publish API container
        run: |
          dotnet publish src/Games/HexMaster.ThePrey.Games.Api/HexMaster.ThePrey.Games.Api.csproj \
            --configuration Release \
            --os linux \
            --arch x64 \
            /t:PublishContainer \
            /p:ContainerRegistry=${{ secrets.ACR_HOSTNAME }} \
            /p:ContainerImageTag=${{ steps.resolve-tag.outputs.imageTag }} \
            /p:Version=${{ needs.version.outputs.semVer }} \
            /p:AssemblyVersion=${{ needs.version.outputs.semVer }} \
            /p:InformationalVersion=${{ needs.version.outputs.semVer }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_PROD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PROD_TENANTID }}
          subscription-id: ${{ secrets.AZURE_PROD_SUBSCRIPTION }}

      - name: Bicep build (lint)
        run: az bicep build --file infra/games/main.bicep

      - name: Deploy Games
        run: |
          az deployment sub create \
            --name theprey-games-prod \
            --location westeurope \
            --template-file infra/games/main.bicep \
            --parameters infra/games/prod.bicepparam \
            --parameters \
              imageTag="${{ needs.publish.outputs.imageTag }}" \
              registryServer="${{ secrets.ACR_HOSTNAME }}" \
              pgAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [version, deploy]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          SEMVER: ${{ needs.version.outputs.semVer }}
        run: |
          TAG="v${SEMVER}"
          # Single shared version line across services: a shared-path change can trigger
          # several service workflows on the same commit, all resolving to the same semVer.
          # Tag/release creation is therefore idempotent — first run wins, the rest no-op.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          if gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes; then
            echo "Created release $TAG."
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG was created concurrently; continuing."
          else
            echo "Failed to create release $TAG." >&2
            exit 1
          fi