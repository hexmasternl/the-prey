<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 956" width="440" height="956" preserveAspectRatio="xMidYMid slice" font-family="'PT Mono','Courier New',monospace">
  <defs>
    <!-- base dark-grey field with faint lift behind the reticle -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%"  stop-color="#1e231b"/>
      <stop offset="45%" stop-color="#171a16"/>
      <stop offset="100%" stop-color="#0a0c0a"/>
    </radialGradient>
    <!-- green halo behind the lock-on point -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#64ff00" stop-opacity="0.20"/>
      <stop offset="55%"  stop-color="#64ff00" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#64ff00" stop-opacity="0"/>
    </radialGradient>
    <!-- radar sweep wedge -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0%"   stop-color="#64ff00" stop-opacity="0.32"/>
      <stop offset="60%"  stop-color="#64ff00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#64ff00" stop-opacity="0"/>
    </linearGradient>
    <!-- edge vignette -->
    <radialGradient id="vig" cx="50%" cy="42%" r="75%">
      <stop offset="55%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- GPS coordinate grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1f4d00" stroke-width="0.6" stroke-opacity="0.45"/>
    </pattern>
    <!-- scanlines -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" fill-opacity="0.18"/>
    </pattern>

    <!-- phosphor glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- film grain -->
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
  </defs>

  <!-- ===== BASE ===== -->
  <rect width="440" height="956" fill="url(#bg)"/>
  <rect width="440" height="956" fill="url(#grid)"/>

  <!-- ===== TOPOGRAPHIC TERRAIN (the playfield) ===== -->
  <g fill="none" stroke="#1f4d00" stroke-opacity="0.55">
    <path d="M-30 760 C 80 700, 150 820, 260 760 S 430 700, 480 770" stroke-width="1"/>
    <path d="M-30 800 C 90 745, 160 855, 270 800 S 430 745, 480 808" stroke-width="1"/>
    <path d="M-30 842 C 100 792, 170 888, 280 842 S 430 792, 480 848" stroke-width="1"/>
    <path d="M-30 886 C 110 842, 180 920, 290 886 S 430 842, 480 890" stroke-width="0.8"/>
    <path d="M-30 150 C 70 110, 150 200, 250 150 S 420 110, 480 165" stroke-width="0.8" stroke-opacity="0.4"/>
    <path d="M-30 190 C 80 150, 160 235, 260 190 S 420 150, 480 200" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- ===== RADAR ===== -->
  <g transform="translate(220 372)">
    <!-- halo behind lock point -->
    <circle r="150" fill="url(#halo)"/>
    <!-- concentric rings -->
    <g fill="none" stroke="#3f9e00">
      <circle r="62"  stroke-opacity="0.55" stroke-width="1"/>
      <circle r="118" stroke-opacity="0.40" stroke-width="1"/>
      <circle r="178" stroke-opacity="0.28" stroke-width="1"/>
      <circle r="244" stroke-opacity="0.16" stroke-width="1"/>
      <circle r="62"  stroke="#64ff00" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="2 8"/>
    </g>
    <!-- crosshair through center -->
    <g stroke="#3f9e00" stroke-opacity="0.5" stroke-width="1">
      <line x1="-260" y1="0" x2="260" y2="0"/>
      <line x1="0" y1="-300" x2="0" y2="320"/>
    </g>
    <!-- (radar sweep is rendered as an animated overlay: sweep.svg) -->

    <!-- lock-on reticle at center (logo sits here) -->
    <g stroke="#64ff00" stroke-width="2" fill="none" filter="url(#glow)">
      <path d="M-34 -34 h12 M-34 -34 v12"/>
      <path d="M34 -34 h-12 M34 -34 v12"/>
      <path d="M-34 34 h12 M-34 34 v-12"/>
      <path d="M34 34 h-12 M34 34 v-12"/>
    </g>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#64ff00" stroke-width="1.5" filter="url(#glow)"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#64ff00" stroke-width="1.5" filter="url(#glow)"/>

    <!-- blips -->
    <g filter="url(#glow)">
      <circle cx="96"  cy="-44" r="3.5" fill="#64ff00"/>
      <circle cx="-128" cy="62" r="3"   fill="#64ff00" fill-opacity="0.8"/>
      <circle cx="40"  cy="156" r="3"   fill="#64ff00" fill-opacity="0.7"/>
      <circle cx="-70" cy="-150" r="3"  fill="#64ff00" fill-opacity="0.6"/>
    </g>
    <circle cx="150" cy="92" r="4" fill="#ff2f1f" filter="url(#glow)"/>
    <circle cx="150" cy="92" r="11" fill="none" stroke="#ff2f1f" stroke-opacity="0.5" stroke-width="1"/>
  </g>

  <!-- ===== HUD CORNER BRACKETS ===== -->
  <g stroke="#64ff00" stroke-width="2" fill="none" stroke-opacity="0.9" filter="url(#glowSoft)">
    <path d="M24 24 h26 M24 24 v26"/>
    <path d="M416 24 h-26 M416 24 v26"/>
    <path d="M24 932 h26 M24 932 v-26"/>
    <path d="M416 932 h-26 M416 932 v-26"/>
  </g>

  <!-- ===== COORDINATE / STATUS READOUTS ===== -->
  <g fill="#5a6553" font-size="11" letter-spacing="1.5">
    <text x="40" y="50">52.0705°N</text>
    <text x="40" y="64">04.3007°E</text>
    <text x="400" y="50" text-anchor="end">SIGNAL LOCK</text>
    <text x="40" y="922">PLAYFIELD ACTIVE</text>
    <text x="400" y="922" text-anchor="end">PREY // HUNTER</text>
  </g>
  <circle cx="333" cy="46" r="3" fill="#64ff00" filter="url(#glow)"/>

  <!-- faint center label slot guide -->
  <text x="220" y="372" text-anchor="middle" fill="#5a6553" font-size="9" letter-spacing="4" opacity="0.45">— LOCK ON —</text>

  <!-- ===== OVERLAYS ===== -->
  <rect width="440" height="956" fill="url(#scan)"/>
  <rect width="440" height="956" filter="url(#grain)" opacity="0.05"/>
  <rect width="440" height="956" fill="url(#vig)"/>
</svg>
