<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Map</title>
    <link rel="stylesheet" href="leaflet.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #0C0E0C; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="leaflet.min.js"></script>
    <script>
        var map = L.map('map', {
            center: [52.3676, 4.9041],
            zoom: 13,
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            touchZoom: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            boxZoom: false,
            keyboard: false
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        var shapeLayer = null;

        function handleMessage(raw) {
            var msg;
            try { msg = JSON.parse(raw); } catch (e) { return; }
            if (msg.type !== 'init') return;

            if (shapeLayer) { map.removeLayer(shapeLayer); shapeLayer = null; }

            var coords = msg.coordinates || [];

            if (coords.length >= 2) {
                var latlngs = coords.map(function (c) { return [c.lat, c.lon]; });
                shapeLayer = (coords.length >= 3)
                    ? L.polygon(latlngs, { color: '#64FF00', weight: 2, fillColor: '#64FF00', fillOpacity: 0.15 }).addTo(map)
                    : L.polyline(latlngs, { color: '#64FF00', weight: 2 }).addTo(map);
                map.fitBounds(L.featureGroup([shapeLayer]).getBounds().pad(0.2));
            } else if (msg.center) {
                map.setView([msg.center.lat, msg.center.lon], 15);
            }
        }

        function signalReady() {
            if (window.HybridWebView && typeof window.HybridWebView.sendRawMessage === 'function') {
                window.HybridWebView.onRawMessageReceived = handleMessage;
                window.HybridWebView.sendRawMessage(JSON.stringify({ type: 'ready' }));
            } else {
                setTimeout(signalReady, 80);
            }
        }

        window.addEventListener('load', signalReady);
    </script>
</body>
</html>
