<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Join game · The Prey</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e0f13; color: #f5f5f5; text-align: center; padding: 24px;
    }
    .card { max-width: 360px; }
    h1 { font-size: 1.4rem; margin: 0 0 .5rem; }
    p { color: #b8bcc6; line-height: 1.5; margin: 0 0 1.5rem; }
    a.btn {
      display: inline-block; background: #e23b3b; color: #fff; text-decoration: none;
      padding: 14px 22px; border-radius: 10px; font-weight: 600; margin-bottom: 12px;
    }
    a.store { display: block; color: #8aa0ff; text-decoration: none; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open in The Prey</h1>
    <p>Tap the button below to join the game in the app. If you don't have it yet, you'll be taken to the store.</p>
    <a id="open" class="btn" href="#">Open in app</a>
    <a id="store" class="store" href="https://play.google.com/store/apps/details?id=nl.hexmaster.theprey.maui.app">Get The Prey on Google Play</a>
  </div>

  <script>
    (function () {
      var PACKAGE = 'nl.hexmaster.theprey.maui.app';
      var STORE = 'https://play.google.com/store/apps/details?id=' + PACKAGE;

      var m = location.pathname.match(/\/join\/([^/?#]+)/);
      var gameId = m ? m[1] : null;

      // Android intent:// — opens the app if installed, else the Play Store.
      // Works from in-app browsers (e.g. WhatsApp's Custom Tab) where verified
      // App Links never fire.
      function intentUrl(id) {
        return 'intent://theprey.nl/join/' + encodeURIComponent(id) +
          '#Intent;scheme=https;package=' + PACKAGE +
          ';S.browser_fallback_url=' + encodeURIComponent(STORE) + ';end';
      }

      var isAndroid = /Android/i.test(navigator.userAgent);
      var target = (gameId && isAndroid) ? intentUrl(gameId) : STORE;

      document.getElementById('open').href = target;

      // Auto-attempt on Android. Most in-app browsers honour this on first load;
      // the visible button covers cases where the auto-launch is blocked.
      if (gameId && isAndroid) {
        setTimeout(function () { location.href = target; }, 250);
      }
    })();
  </script>
</body>
</html>
