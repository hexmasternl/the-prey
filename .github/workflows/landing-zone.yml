name: Landing Zone

on:
  push:
    branches: [main]
    paths:
      - 'infra/landing-zone/**'
      - 'infra/modules/**'
      - '.github/workflows/landing-zone.yml'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'infra/landing-zone/**'
      - 'infra/modules/**'
      - '.github/workflows/landing-zone.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: landing-zone-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_PROD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PROD_TENANTID }}
          subscription-id: ${{ secrets.AZURE_PROD_SUBSCRIPTION }}

      - name: Bicep build
        run: az bicep build --file infra/landing-zone/main.bicep

      - name: What-if
        run: |
          az deployment sub what-if \
            --name theprey-lz-validate \
            --location westeurope \
            --template-file infra/landing-zone/main.bicep

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_PROD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PROD_TENANTID }}
          subscription-id: ${{ secrets.AZURE_PROD_SUBSCRIPTION }}

      - name: Deploy landing zone
        run: |
          az deployment sub create \
            --name theprey-lz-prod \
            --location westeurope \
            --template-file infra/landing-zone/main.bicep
