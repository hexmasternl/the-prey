<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="back()">&#8592; Back</ion-button>
    </ion-buttons>
    <ion-title>New Playfield</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Name -->
  <ion-item>
    <ion-input
      label="Name"
      labelPlacement="floating"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      placeholder="e.g. City Park Arena"
      clearInput
    ></ion-input>
  </ion-item>

  <!-- Public toggle -->
  <ion-item>
    <ion-label>Public</ion-label>
    <ion-toggle
      slot="end"
      [checked]="isPublic()"
      (ionChange)="isPublic.set($any($event).detail.checked)"
    ></ion-toggle>
  </ion-item>

  <ion-item lines="none">
    <ion-button expand="block" fill="outline" (click)="goToArea()" style="width:100%;">
      @if (areaPoints().length >= 3) {
        Set Area ({{ areaPoints().length }} points)
      } @else {
        Set Area
      }
    </ion-button>
    @if (areaPoints().length > 0 && areaPoints().length < 3) {
      <ion-note color="warning" style="font-size:0.8em;padding-top:4px;">
        At least 3 points required
      </ion-note>
    }
  </ion-item>

  <ion-button
    expand="block"
    color="primary"
    class="save-btn"
    [disabled]="!canSave() || isSaving()"
    (click)="save()"
  >
    @if (isSaving()) {
      <ion-spinner name="lines" slot="start"></ion-spinner> Saving...
    } @else {
      Save Playfield
    }
  </ion-button>
</ion-content>
