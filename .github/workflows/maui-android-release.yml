name: MAUI Android Release

# Builds and publishes the .NET MAUI app (nl.hexmaster.theprey.maui.app) to Google Play.
# One-time setup (keystore, Play Console app, service account, GitHub secrets) is documented in
# docs/maui-deployment.md. This is separate from android-release.yml, which ships the Ionic app.

on:
  push:
    tags: ["maui-v*"] # e.g. `git push origin maui-v1.1.0` ships displayVersion 1.1.0 to the internal track
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to release to"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal
      displayVersion:
        description: "versionName baked into the bundle (e.g. 1.1.0)"
        type: string
        default: "1.0"
      status:
        description: "Play release status (use 'draft' for the very first automated release)"
        type: choice
        options: [completed, draft]
        default: completed

permissions:
  contents: read

concurrency:
  group: maui-android-release-${{ github.ref }}
  cancel-in-progress: false # never cancel a half-finished publish

env:
  APP_CSPROJ: src/HexMaster.ThePrey.Maui.App/HexMaster.ThePrey.Maui.App.csproj
  PACKAGE_NAME: nl.hexmaster.theprey.maui.app
  DOTNET_VERSION: "10.0.x"
  # If your manual first upload used a high versionCode, raise this so run_number-derived codes stay ahead.
  VERSION_CODE_OFFSET: "0"

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17" # .NET for Android build tooling requires JDK 17
          distribution: "temurin"

      - name: Install MAUI Android workload
        # On Linux the csproj targets only net10.0-android, so this pulls just maui-android.
        run: dotnet workload restore "$APP_CSPROJ"

      - name: Restore
        run: dotnet restore "$APP_CSPROJ"

      # ---- resolve the version going into the bundle ----------------------
      - name: Resolve version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
          INPUT_DISPLAY: ${{ github.event.inputs.displayVersion }}
        run: |
          version_code=$(( RUN_NUMBER + VERSION_CODE_OFFSET ))

          # versionName: the workflow_dispatch input, else parsed from a maui-vX.Y.Z tag, else 1.0.
          display="$INPUT_DISPLAY"
          if [ -z "$display" ]; then
            case "$GITHUB_REF" in
              refs/tags/maui-v*) display="${GITHUB_REF#refs/tags/maui-v}" ;;
              *) display="1.0" ;;
            esac
          fi

          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "display=$display" >> "$GITHUB_OUTPUT"
          {
            echo "### MAUI Android bundle"
            echo "- versionName: \`$display\`"
            echo "- versionCode: \`$version_code\`"
            echo "- track: \`${{ github.event.inputs.track || 'internal' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- restore the signing keystore into the runner -------------------
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.MAUI_ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/theprey-maui.keystore"

      # ---- build the signed AAB -------------------------------------------
      - name: Publish signed AAB
        run: |
          dotnet publish "$APP_CSPROJ" \
            -f net10.0-android -c Release \
            -p:AndroidPackageFormat=aab \
            -p:ApplicationVersion=${{ steps.version.outputs.version_code }} \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.display }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/theprey-maui.keystore" \
            -p:AndroidSigningKeyAlias='${{ secrets.MAUI_ANDROID_KEY_ALIAS }}' \
            -p:AndroidSigningStorePass='${{ secrets.MAUI_ANDROID_KEYSTORE_PASSWORD }}' \
            -p:AndroidSigningKeyPass='${{ secrets.MAUI_ANDROID_KEY_PASSWORD }}'

      - name: Locate the AAB
        id: aab
        run: |
          path="$(find src/HexMaster.ThePrey.Maui.App/bin/Release/net10.0-android -name '*-Signed.aab' | head -n 1)"
          if [ -z "$path" ]; then
            echo "::error::No signed .aab found — check the signing properties/secrets."
            exit 1
          fi
          echo "Found $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-android-aab
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: error

      # ---- publish to Google Play -----------------------------------------
      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.status || 'completed' }}
