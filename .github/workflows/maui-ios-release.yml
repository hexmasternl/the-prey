name: MAUI iOS Release

# Builds and uploads the .NET MAUI app (nl.hexmaster.theprey.maui.app) to TestFlight / App Store Connect.
# One-time setup (Apple Developer app id, distribution cert, provisioning profile, App Store Connect API
# key, GitHub secrets) is documented in docs/maui-ios-deployment.md.
# NOTE: runs on a macOS runner (Xcode required) — macOS minutes bill at ~10x the Linux rate.

on:
  # Manual only — this workflow never runs on its own. Trigger it from
  # Actions → MAUI iOS Release → Run workflow (no push/tag triggers).
  workflow_dispatch:
    inputs:
      displayVersion:
        description: "Marketing version (CFBundleShortVersionString), e.g. 1.1.0"
        type: string
        default: "1.0"

permissions:
  contents: read

concurrency:
  group: maui-ios-release-${{ github.ref }}
  cancel-in-progress: false # never cancel a half-finished upload

env:
  APP_CSPROJ: src/Maui/HexMaster.ThePrey.Maui.App/HexMaster.ThePrey.Maui.App.csproj
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-publish:
    name: Build & Upload
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable # pin to a specific version if the .NET 10 iOS workload requires it

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Restore
        run: dotnet restore "$APP_CSPROJ"

      # ---- signing material -----------------------------------------------
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          profiles="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$profiles"
          echo "$PROFILE_BASE64" | base64 --decode > "$profiles/theprey-maui.mobileprovision"

      # ---- resolve the version --------------------------------------------
      - name: Resolve version
        id: version
        env:
          INPUT_DISPLAY: ${{ github.event.inputs.displayVersion }}
        run: |
          display="$INPUT_DISPLAY"
          if [ -z "$display" ]; then
            case "$GITHUB_REF" in
              refs/tags/maui-ios-v*) display="${GITHUB_REF#refs/tags/maui-ios-v}" ;;
              *) display="1.0" ;;
            esac
          fi
          echo "display=$display" >> "$GITHUB_OUTPUT"
          {
            echo "### MAUI iOS build"
            echo "- CFBundleShortVersionString: \`$display\`"
            echo "- CFBundleVersion (build): \`${{ github.run_number }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- build the signed .ipa ------------------------------------------
      - name: Publish signed IPA
        run: |
          dotnet publish "$APP_CSPROJ" \
            -f net10.0-ios -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.display }} \
            -p:CodesignKey="${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            -p:CodesignProvision="${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}"

      - name: Locate the IPA
        id: ipa
        run: |
          path="$(find src/Maui/HexMaster.ThePrey.Maui.App/bin/Release/net10.0-ios -name '*.ipa' | head -n 1)"
          if [ -z "$path" ]; then
            echo "::error::No .ipa found — check the signing identity / provisioning profile."
            exit 1
          fi
          echo "Found $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-ios-ipa
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: error

      # ---- upload to TestFlight / App Store Connect ------------------------
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
