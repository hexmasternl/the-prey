<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tactical army map background tile for the home screen.
  The tile is seamless: grid patterns divide 1600 exactly, the river enters and
  exits the left/right edges at the same y (and horizontally), the patrol route
  enters and exits the top/bottom edges at the same x (and vertically), and all
  other features stay clear of the edges. Repeating + panning therefore never
  shows a seam.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <pattern id="grid-minor" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#64ff00" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="grid-major" width="400" height="400" patternUnits="userSpaceOnUse">
      <path d="M400 0H0V400" fill="none" stroke="#64ff00" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#64ff00" stroke-opacity="0.10" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- Coordinate grid -->
  <rect width="1600" height="1600" fill="url(#grid-minor)"/>
  <rect width="1600" height="1600" fill="url(#grid-major)"/>

  <!-- Hill complex NW: nested topographic contours -->
  <g fill="none" stroke="#64ff00" stroke-width="1.3">
    <path stroke-opacity="0.10" d="M200 340 C195 245 290 175 400 180 C515 185 600 250 605 345 C610 440 530 510 410 505 C290 500 205 435 200 340 Z"/>
    <path stroke-opacity="0.13" d="M250 340 C248 270 320 215 405 220 C495 225 555 275 558 345 C561 415 500 465 410 460 C320 455 252 410 250 340 Z"/>
    <path stroke-opacity="0.16" d="M300 340 C300 295 350 255 408 258 C470 261 510 300 510 345 C510 390 468 422 410 418 C352 414 300 385 300 340 Z"/>
    <path stroke-opacity="0.20" d="M350 340 C352 312 378 295 410 297 C445 299 462 318 460 344 C458 370 436 382 408 380 C380 378 348 368 350 340 Z"/>
  </g>
  <text x="408" y="350" font-family="monospace" font-size="15" fill="#64ff00" fill-opacity="0.30" text-anchor="middle">&#9650; 214</text>

  <!-- Hill complex SE -->
  <g fill="none" stroke="#64ff00" stroke-width="1.3">
    <path stroke-opacity="0.10" d="M1010 1190 C1000 1095 1090 1020 1205 1025 C1320 1030 1410 1100 1415 1195 C1420 1290 1330 1365 1210 1360 C1090 1355 1020 1285 1010 1190 Z"/>
    <path stroke-opacity="0.13" d="M1065 1190 C1060 1120 1130 1065 1210 1070 C1295 1075 1360 1125 1362 1192 C1364 1259 1300 1312 1212 1308 C1124 1304 1070 1260 1065 1190 Z"/>
    <path stroke-opacity="0.16" d="M1120 1190 C1118 1145 1165 1108 1212 1112 C1265 1116 1308 1150 1308 1192 C1308 1234 1265 1265 1214 1262 C1163 1259 1122 1235 1120 1190 Z"/>
    <path stroke-opacity="0.20" d="M1172 1190 C1172 1165 1192 1150 1214 1152 C1240 1154 1256 1170 1255 1192 C1254 1214 1236 1226 1213 1224 C1190 1222 1172 1215 1172 1190 Z"/>
  </g>
  <text x="1213" y="1198" font-family="monospace" font-size="15" fill="#64ff00" fill-opacity="0.30" text-anchor="middle">&#9650; 187</text>

  <!-- Small ridge NE -->
  <g fill="none" stroke="#64ff00" stroke-width="1.2">
    <path stroke-opacity="0.10" d="M1150 290 C1150 235 1215 195 1295 200 C1375 205 1430 250 1428 300 C1426 350 1365 385 1290 380 C1215 375 1150 345 1150 290 Z"/>
    <path stroke-opacity="0.14" d="M1205 290 C1208 255 1248 232 1295 236 C1345 240 1378 268 1376 298 C1374 328 1338 348 1292 344 C1246 340 1202 325 1205 290 Z"/>
    <path stroke-opacity="0.18" d="M1255 290 C1258 272 1278 262 1297 264 C1320 266 1334 280 1332 296 C1330 312 1312 320 1294 318 C1276 316 1252 308 1255 290 Z"/>
  </g>

  <!-- Small ridge SW -->
  <g fill="none" stroke="#64ff00" stroke-width="1.2">
    <path stroke-opacity="0.10" d="M260 1310 C258 1255 320 1215 395 1220 C472 1225 525 1268 523 1318 C521 1368 462 1402 390 1397 C318 1392 262 1365 260 1310 Z"/>
    <path stroke-opacity="0.14" d="M315 1310 C316 1276 354 1254 396 1258 C440 1262 472 1288 470 1318 C468 1348 434 1366 394 1362 C354 1358 314 1344 315 1310 Z"/>
    <path stroke-opacity="0.18" d="M362 1310 C364 1293 382 1284 398 1286 C418 1288 430 1300 428 1314 C426 1328 410 1336 396 1334 C382 1332 360 1327 362 1310 Z"/>
  </g>

  <!-- River: enters left edge at y=880 and exits right edge at y=880, horizontal at both edges -->
  <path d="M0 880 C120 880 180 820 280 800 C390 778 430 860 540 880 C650 900 700 990 820 1000 C940 1010 990 920 1100 900 C1210 880 1290 950 1390 940 C1470 932 1530 880 1600 880"
        fill="none" stroke="#64ff00" stroke-opacity="0.14" stroke-width="2.5"/>
  <text x="700" y="975" font-family="monospace" font-size="14" fill="#64ff00" fill-opacity="0.22" transform="rotate(8 700 975)">RIVER KESTREL</text>

  <!-- Patrol route: enters top edge at x=620 and exits bottom edge at x=620, vertical at both edges -->
  <path d="M620 0 C620 110 540 170 530 280 C520 390 640 440 660 550 C680 660 580 730 570 840 C560 950 680 1010 700 1120 C720 1230 600 1300 590 1410 C582 1500 620 1530 620 1600"
        fill="none" stroke="#64ff00" stroke-opacity="0.18" stroke-width="1.6" stroke-dasharray="10 8"/>

  <!-- Restricted zone (hatched) -->
  <g>
    <polygon points="900,360 1060,330 1100,470 990,560 880,500" fill="url(#hatch)" stroke="#64ff00" stroke-opacity="0.20" stroke-width="1.4" stroke-dasharray="6 5"/>
    <text x="985" y="455" font-family="monospace" font-size="14" fill="#64ff00" fill-opacity="0.30" text-anchor="middle">NO-GO</text>
  </g>

  <!-- Waypoint markers: crosshair circles -->
  <g stroke="#64ff00" stroke-opacity="0.30" stroke-width="1.4" fill="none">
    <g><circle cx="530" cy="280" r="13"/><path d="M530 259v10M530 291v10M509 280h10M551 280h10"/></g>
    <g><circle cx="700" cy="1120" r="13"/><path d="M700 1099v10M700 1131v10M679 1120h10M721 1120h10"/></g>
    <g><circle cx="1390" cy="940" r="13"/><path d="M1390 919v10M1390 951v10M1369 940h10M1411 940h10"/></g>
  </g>
  <text x="552" y="262" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.28">WP-01</text>
  <text x="722" y="1102" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.28">WP-02</text>
  <text x="1412" y="922" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.28">WP-03</text>

  <!-- Objective: X marker -->
  <g stroke="#64ff00" stroke-opacity="0.32" stroke-width="2" fill="none">
    <path d="M152 742 L180 770 M180 742 L152 770"/>
    <circle cx="166" cy="756" r="22" stroke-opacity="0.16"/>
  </g>
  <text x="166" y="810" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.26" text-anchor="middle">OBJ RAVEN</text>

  <!-- Observation posts: triangles -->
  <g stroke="#64ff00" stroke-opacity="0.28" stroke-width="1.4" fill="none">
    <path d="M1245 640 l13 22 h-26 Z"/>
    <path d="M345 1075 l13 22 h-26 Z"/>
  </g>
  <text x="1268" y="660" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.26">OP-4</text>
  <text x="368" y="1095" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.26">OP-2</text>

  <!-- Sector labels on major grid intersections -->
  <g font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.18">
    <text x="412" y="790">52N-AE</text>
    <text x="812" y="390">52N-AF</text>
    <text x="1212" y="790">52N-BF</text>
    <text x="812" y="1190">52N-BE</text>
    <text x="92" y="1505">52N-AD</text>
    <text x="1412" y="105">52N-CF</text>
  </g>

  <!-- Compass rose -->
  <g transform="translate(1440,1460)" stroke="#64ff00" fill="none">
    <circle r="30" stroke-opacity="0.22" stroke-width="1.3"/>
    <circle r="20" stroke-opacity="0.14" stroke-width="1"/>
    <path d="M0 -26 L6 0 L0 26 L-6 0 Z" stroke-opacity="0.30" stroke-width="1.2"/>
    <path d="M0 -26 L6 0 H-6 Z" fill="#64ff00" fill-opacity="0.22" stroke="none"/>
  </g>
  <text x="1440" y="1407" font-family="monospace" font-size="13" fill="#64ff00" fill-opacity="0.30" text-anchor="middle">N</text>
</svg>
