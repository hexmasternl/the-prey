name: Android Release

on:
  push:
    tags: ["v*"] # e.g. push tag v1.4.0 to ship
    branches: [main] # auto-run on app changes merged to main
    paths:
      - "src/ThePrey/**"
      - ".github/workflows/android-release.yml"
  workflow_dispatch: # or run manually and choose a track
    inputs:
      track:
        description: "Play track to release to"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal

permissions:
  contents: write # create git tags and GitHub releases

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false # never cancel a half-finished publish

jobs:
  version:
    name: Version
    uses: ./.github/workflows/version.yml

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Resolve the refs to diff: head is this run's commit, base is the most
      # recent tag reachable before it. Falls back to the repo's first commit
      # when no prior tag exists, so the action never gets handed a ref that
      # isn't in the runner's history (the cause of the git exit-128 failure).
      - name: Resolve release-notes refs
        id: notes_refs
        run: |
          head_ref="$GITHUB_SHA"
          base_ref="$(git describe --tags --abbrev=0 "${head_ref}^" 2>/dev/null || true)"
          if [ -z "$base_ref" ]; then
            base_ref="$(git rev-list --max-parents=0 "$head_ref" | tail -n 1)"
          fi
          echo "base-ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "head-ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "Generating release notes for $base_ref..$head_ref"

      - name: Generate release notes
        uses: github/copilot-release-notes@v1
        continue-on-error: true # release-notes are nice-to-have; never block the publish
        with:
          base-ref: ${{ steps.notes_refs.outputs.base-ref }}
          head-ref: ${{ steps.notes_refs.outputs.head-ref }}
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      # ---- toolchains ------------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          java-version: "21" # Capacitor 7+ requires JDK 21
          distribution: "temurin"

      # ---- build the web app and copy it into the native project ----------
      - name: Install dependencies
        working-directory: src/ThePrey
        run: npm ci

      - name: Build web assets
        working-directory: src/ThePrey
        run: npm run build -- --configuration production

      - name: Sync Capacitor
        working-directory: src/ThePrey
        run: npx cap sync android

      # ---- restore the signing material into the runner -------------------
      - name: Decode keystore
        working-directory: src/ThePrey/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Create key.properties
        working-directory: src/ThePrey/android
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=theprey" >> key.properties
          echo "storeFile=keystore.jks" >> key.properties

      # ---- resolve & verify the version going into the bundle -------------
      # build.gradle silently falls back to versionName "1.0" when the
      # versionName property is empty, which would mask a broken version chain.
      # Fail loudly instead, and surface the exact values that will be baked in.
      - name: Resolve app version
        env:
          SEMVER: ${{ needs.version.outputs.semVer }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -z "$SEMVER" ]; then
            echo "::error::GitVersion produced an empty semVer; refusing to ship a fallback (1.0) bundle."
            exit 1
          fi
          echo "versionName (semVer)      : $SEMVER"
          echo "versionCode  (run number) : $RUN_NUMBER"
          {
            echo "### Android bundle version"
            echo "- versionName: \`$SEMVER\`"
            echo "- versionCode: \`$RUN_NUMBER\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- build the signed bundle ----------------------------------------
      - name: Build Release AAB
        working-directory: src/ThePrey/android
        env:
          ORG_GRADLE_PROJECT_versionCode: ${{ github.run_number }}
          ORG_GRADLE_PROJECT_versionName: ${{ needs.version.outputs.semVer }}
        run: ./gradlew bundleRelease

      # Short-lived copy of the exact bundle that goes to Play, for spot-checking a
      # build without pulling it back out of the Play Console. Uploaded before the
      # publish step so the bundle is still retrievable when a Play upload fails.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ionic-android-aab-${{ needs.version.outputs.semVer }}
          path: src/ThePrey/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 3

      # ---- publish to Google Play -----------------------------------------
      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: nl.hexmaster.theprey
          releaseFiles: src/ThePrey/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

      # ---- tag the commit and cut a GitHub release ------------------------
      # Runs only after a successful Play publish, so GitHub releases track
      # exactly what shipped. `gh release create` creates the annotated tag at
      # --target when it doesn't exist yet (e.g. on main / workflow_dispatch
      # runs); on a `v*` tag-triggered run the tag already exists and is reused.
      # Idempotent: skips if a release for the tag is already present.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.version.outputs.semVer }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes \
              src/ThePrey/android/app/build/outputs/bundle/release/app-release.aab
          fi
