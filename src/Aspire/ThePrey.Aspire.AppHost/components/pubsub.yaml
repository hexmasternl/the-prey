apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    # Local-development RabbitMQ backing for the Dapr pub/sub component. The AppHost runs the
    # RabbitMQ container with these fixed credentials on host port 5672 so this static connection
    # string resolves. In the cloud, a separate Dapr component (Azure Service Bus) is provisioned
    # via Bicep and this file is not used.
    - name: connectionString
      value: "amqp://guest:guest@localhost:5672"
    - name: durable
      value: "true"
    - name: deletedWhenUnused
      value: "false"
