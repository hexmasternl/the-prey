<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 956" width="440" height="956" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- radar sweep wedge: bright at the leading edge, fading along the tail -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0%"   stop-color="#64ff00" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#64ff00" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#64ff00" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- centred on the backdrop radar lock point (220,372) -->
  <g transform="translate(220 372)">
    <path d="M0 0 L 278 0 A 278 278 0 0 0 252 -120 Z" fill="url(#sweep)"/>
    <!-- bright leading edge of the sweep -->
    <line x1="0" y1="0" x2="278" y2="0" stroke="#64ff00" stroke-opacity="0.6" stroke-width="2" filter="url(#glow)"/>
  </g>
</svg>
