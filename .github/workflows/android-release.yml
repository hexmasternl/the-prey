name: Android Release

on:
  push:
    tags: ['v*']            # e.g. push tag v1.4.0 to ship
    branches: [main]        # auto-run on app changes merged to main
    paths:
      - 'src/ThePrey/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:        # or run manually and choose a track
    inputs:
      track:
        description: 'Play track to release to'
        type: choice
        options: [internal, alpha, beta, production]
        default: internal

permissions:
  contents: write   # create git tags and GitHub releases

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a half-finished publish

jobs:
  version:
    name: Version
    uses: ./.github/workflows/version.yml

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      # ---- toolchains ------------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'        # Capacitor 7+ requires JDK 21
          distribution: 'temurin'

      # ---- build the web app and copy it into the native project ----------
      - name: Install dependencies
        working-directory: src/ThePrey
        run: npm ci

      - name: Build web assets
        working-directory: src/ThePrey
        run: npm run build -- --configuration production

      - name: Sync Capacitor
        working-directory: src/ThePrey
        run: npx cap sync android

      # ---- restore the signing material into the runner -------------------
      - name: Decode keystore
        working-directory: src/ThePrey/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Create key.properties
        working-directory: src/ThePrey/android
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=theprey" >> key.properties
          echo "storeFile=keystore.jks" >> key.properties

      # ---- build the signed bundle ----------------------------------------
      - name: Build Release AAB
        working-directory: src/ThePrey/android
        env:
          ORG_GRADLE_PROJECT_versionCode: ${{ github.run_number }}
          ORG_GRADLE_PROJECT_versionName: ${{ needs.version.outputs.semVer }}
        run: ./gradlew bundleRelease

      # ---- publish to Google Play -----------------------------------------
      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: nl.hexmaster.theprey
          releaseFiles: src/ThePrey/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

      # ---- tag the commit and cut a GitHub release ------------------------
      # Runs only after a successful Play publish, so GitHub releases track
      # exactly what shipped. `gh release create` creates the annotated tag at
      # --target when it doesn't exist yet (e.g. on main / workflow_dispatch
      # runs); on a `v*` tag-triggered run the tag already exists and is reused.
      # Idempotent: skips if a release for the tag is already present.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.version.outputs.semVer }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes \
              src/ThePrey/android/app/build/outputs/bundle/release/app-release.aab
          fi
