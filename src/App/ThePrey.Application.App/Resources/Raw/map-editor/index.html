<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Area Editor</title>
    <link rel="stylesheet" href="leaflet.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #0C0E0C; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="leaflet.min.js"></script>
    <script>
        // ── State ────────────────────────────────────────────────────────────
        var points  = [];   // [{lat, lon}]
        var markers = [];   // Leaflet CircleMarker per point
        var shape   = null; // current Polygon or Polyline layer

        // ── Map ──────────────────────────────────────────────────────────────
        var map = L.map('map', {
            center: [52.3676, 4.9041],
            zoom: 13,
            zoomControl: true,
            attributionControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // ── Marker & shape helpers ────────────────────────────────────────────

        function rebindAll() {
            markers.forEach(function (m, i) {
                m.off('click');
                m.on('click', function (e) {
                    L.DomEvent.stopPropagation(e);
                    L.DomEvent.preventDefault(e);
                    removePoint(i);
                });
            });
        }

        function addPoint(lat, lon) {
            var m = L.circleMarker([lat, lon], {
                radius: 9,
                color: '#39402F',
                weight: 2,
                fillColor: '#64FF00',
                fillOpacity: 0.9
            }).addTo(map);

            points.push({ lat: lat, lon: lon });
            markers.push(m);
            rebindAll();   // rebind so every marker has the correct current index
            redraw();
            sendUpdate();
        }

        function removePoint(index) {
            map.removeLayer(markers[index]);
            markers.splice(index, 1);
            points.splice(index, 1);
            rebindAll();
            redraw();
            sendUpdate();
        }

        function redraw() {
            if (shape) { map.removeLayer(shape); shape = null; }
            if (points.length < 2) return;

            var latlngs = points.map(function (p) { return [p.lat, p.lon]; });

            shape = (points.length >= 3)
                ? L.polygon(latlngs, { color: '#64FF00', weight: 2, fillColor: '#64FF00', fillOpacity: 0.12 }).addTo(map)
                : L.polyline(latlngs, { color: '#64FF00', weight: 2 }).addTo(map);
        }

        // ── Map tap → add point ──────────────────────────────────────────────
        map.on('click', function (e) {
            addPoint(e.latlng.lat, e.latlng.lng);
        });

        // ── Messaging ────────────────────────────────────────────────────────

        function handleMessage(raw) {
            var msg;
            try { msg = JSON.parse(raw); } catch (e) { return; }

            if (msg.type === 'init') {
                // Load existing coordinates
                if (msg.coordinates && msg.coordinates.length > 0) {
                    msg.coordinates.forEach(function (c) {
                        var m = L.circleMarker([c.lat, c.lon], {
                            radius: 9,
                            color: '#39402F',
                            weight: 2,
                            fillColor: '#64FF00',
                            fillOpacity: 0.9
                        }).addTo(map);
                        points.push({ lat: c.lat, lon: c.lon });
                        markers.push(m);
                    });
                    rebindAll();
                    redraw();
                    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
                    sendUpdate();
                } else if (msg.center) {
                    // No coordinates yet — center on player location supplied by C#
                    map.setView([msg.center.lat, msg.center.lon], 16);
                }
            }
        }

        function sendUpdate() {
            window.HybridWebView.sendRawMessage(JSON.stringify({
                type: 'update',
                coordinates: points
            }));
        }

        // Signal ready — retries until MAUI injects the bridge, then sets the
        // onRawMessageReceived callback (must be set after the bridge exists).
        function signalReady() {
            if (window.HybridWebView && typeof window.HybridWebView.sendRawMessage === 'function') {
                window.HybridWebView.onRawMessageReceived = handleMessage;
                window.HybridWebView.sendRawMessage(JSON.stringify({ type: 'ready' }));
            } else {
                setTimeout(signalReady, 80);
            }
        }

        window.addEventListener('load', signalReady);
    </script>
</body>
</html>
