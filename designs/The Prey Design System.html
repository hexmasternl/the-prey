+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Special Elite';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"b15a9687-e063-4353-b9e7-7de937b649a8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{background:#181b17;-webkit-font-smoothing:antialiased}\n  ::selection{background:rgba(100,255,0,.25);color:#dcf6d2}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes blipPing{0%{box-shadow:0 0 0 0 rgba(100,255,0,.35)}100%{box-shadow:0 0 0 14px transparent}}\n  @keyframes ringExpand{0%{inset:-4px;opacity:.7}100%{inset:-20px;opacity:0}}\n  @keyframes preyPingExpand{0%{inset:-3px;opacity:.8}100%{inset:-16px;opacity:0}}\n  @keyframes preyFlash{0%,100%{opacity:1}50%{opacity:.4}}\n  @keyframes pillPulse{0%,100%{opacity:1}50%{opacity:.65}}\n  @keyframes valueFlash{0%,100%{opacity:1}50%{opacity:.2}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"position:relative;min-height:100vh;font-family:'PT Mono','Courier New',monospace;color:#dcf6d2;font-size:15px;line-height:1.65;letter-spacing:.2px;background:radial-gradient(1200px 700px at 80% -10%, rgba(100,255,0,.06), transparent 60%), radial-gradient(900px 600px at -10% 110%, rgba(19,224,200,.04), transparent 55%), #181b17;\">\n\n  <div style=\"position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.16) 3px, rgba(0,0,0,0) 4px);mix-blend-mode:multiply;opacity:.5;\"><\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:264px 1fr;max-width:1480px;margin:0 auto;\">\n\n    <!-- ================= NAV ================= -->\n    <nav style=\"position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;border-right:1px solid #39402f;padding:34px 22px;background:rgba(12,14,12,.55);backdrop-filter:blur(4px);z-index:50;\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#64ff00\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><path d=\"M12 1v5M12 18v5M1 12h5M18 12h5\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"1.5\" fill=\"#64ff00\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-family:'Special Elite',monospace;font-size:21px;color:#64ff00;line-height:1;text-shadow:0 0 14px rgba(100,255,0,.35);\">THE PREY<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:10.5px;color:#5a6553;letter-spacing:2.5px;text-transform:uppercase;margin:10px 0 30px;\">Design System v1.0<\u002Fdiv>\n\n      <div style=\"font-size:9.5px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin:0 0 8px 12px;\">Foundations<\u002Fdiv>\n      <sc-for list=\"{{ navFoundations }}\" as=\"n\" hint-placeholder-count=\"6\">\n        <a href=\"{{ n.href }}\" style=\"display:flex;align-items:center;color:#8c9a83;text-decoration:none;font-size:12.5px;padding:7px 12px;border-left:2px solid transparent;letter-spacing:.6px;text-transform:uppercase;transition:.18s;\" style-hover=\"color:#64ff00;border-left:2px solid #64ff00;background:rgba(100,255,0,.05);\">\n          <span style=\"color:#5a6553;margin-right:10px;font-size:11px;\">{{ n.idx }}<\u002Fspan>{{ n.label }}\n        <\u002Fa>\n      <\u002Fsc-for>\n\n      <div style=\"font-size:9.5px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin:24px 0 8px 12px;\">Components<\u002Fdiv>\n      <sc-for list=\"{{ navSystem }}\" as=\"n\" hint-placeholder-count=\"6\">\n        <a href=\"{{ n.href }}\" style=\"display:flex;align-items:center;color:#8c9a83;text-decoration:none;font-size:12.5px;padding:7px 12px;border-left:2px solid transparent;letter-spacing:.6px;text-transform:uppercase;transition:.18s;\" style-hover=\"color:#64ff00;border-left:2px solid #64ff00;background:rgba(100,255,0,.05);\">\n          <span style=\"color:#5a6553;margin-right:10px;font-size:11px;\">{{ n.idx }}<\u002Fspan>{{ n.label }}\n        <\u002Fa>\n      <\u002Fsc-for>\n\n      <div style=\"font-size:9.5px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin:24px 0 8px 12px;\">Game UI<\u002Fdiv>\n      <sc-for list=\"{{ navGame }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <a href=\"{{ n.href }}\" style=\"display:flex;align-items:center;color:#8c9a83;text-decoration:none;font-size:12.5px;padding:7px 12px;border-left:2px solid transparent;letter-spacing:.6px;text-transform:uppercase;transition:.18s;\" style-hover=\"color:#64ff00;border-left:2px solid #64ff00;background:rgba(100,255,0,.05);\">\n          <span style=\"color:#5a6553;margin-right:10px;font-size:11px;\">{{ n.idx }}<\u002Fspan>{{ n.label }}\n        <\u002Fa>\n      <\u002Fsc-for>\n\n      <div style=\"font-size:9.5px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin:24px 0 8px 12px;\">Patterns<\u002Fdiv>\n      <sc-for list=\"{{ navPatterns }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <a href=\"{{ n.href }}\" style=\"display:flex;align-items:center;color:#8c9a83;text-decoration:none;font-size:12.5px;padding:7px 12px;border-left:2px solid transparent;letter-spacing:.6px;text-transform:uppercase;transition:.18s;\" style-hover=\"color:#64ff00;border-left:2px solid #64ff00;background:rgba(100,255,0,.05);\">\n          <span style=\"color:#5a6553;margin-right:10px;font-size:11px;\">{{ n.idx }}<\u002Fspan>{{ n.label }}\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <!-- ================= MAIN ================= -->\n    <main style=\"padding:60px 56px 140px;max-width:1060px;\">\n\n      <!-- HERO -->\n      <div style=\"position:relative;overflow:hidden;border:1px solid #39402f;background:linear-gradient(135deg, rgba(100,255,0,.05), transparent 50%), #0c0e0c;padding:54px 48px;margin-bottom:90px;\">\n        <span style=\"position:absolute;top:10px;left:10px;width:16px;height:16px;border:2px solid #64ff00;border-right:0;border-bottom:0;\"><\u002Fspan>\n        <span style=\"position:absolute;top:10px;right:10px;width:16px;height:16px;border:2px solid #64ff00;border-left:0;border-bottom:0;\"><\u002Fspan>\n        <span style=\"position:absolute;bottom:10px;left:10px;width:16px;height:16px;border:2px solid #64ff00;border-right:0;border-top:0;\"><\u002Fspan>\n        <span style=\"position:absolute;bottom:10px;right:10px;width:16px;height:16px;border:2px solid #64ff00;border-left:0;border-top:0;\"><\u002Fspan>\n        <div style=\"position:absolute;top:16px;right:20px;font-size:11px;color:#5a6553;letter-spacing:1px;\">52.0705° N // 4.3007° E // SIGNAL LOCK<\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:4px;color:#3f9e00;text-transform:uppercase;margin-bottom:20px;\">Design System — v1.0<\u002Fdiv>\n        <h1 style=\"font-family:'Special Elite',monospace;font-size:clamp(48px,8vw,86px);line-height:.92;color:#dcf6d2;letter-spacing:1px;\">STAY <em style=\"font-style:normal;color:#64ff00;text-shadow:0 0 28px rgba(100,255,0,.35);\">HIDDEN.<\u002Fem><br>HUNT <em style=\"font-style:normal;color:#64ff00;text-shadow:0 0 28px rgba(100,255,0,.35);\">SMART.<\u002Fem><\u002Fh1>\n        <p style=\"font-size:15px;color:#8c9a83;max-width:60ch;margin-top:24px;\">The complete visual operating system for <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">The Prey<\u002Fspan> — a GPS-based, real-world hide-and-seek game. Every token, component, and motion cue that turns the open world into a playfield, in one reference.<\u002Fp>\n        <div style=\"display:flex;margin-top:36px;border:1px solid #39402f;\">\n          <div style=\"flex:1;padding:14px 18px;border-right:1px solid #39402f;\"><div style=\"font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Surface<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#64ff00;margin-top:4px;\">DARK GREY<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;padding:14px 18px;border-right:1px solid #39402f;\"><div style=\"font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Signal<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#64ff00;margin-top:4px;\">#64FF00<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;padding:14px 18px;border-right:1px solid #39402f;\"><div style=\"font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Display<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#64ff00;margin-top:4px;\">SPECIAL ELITE<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;padding:14px 18px;\"><div style=\"font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Body<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#64ff00;margin-top:4px;\">PT MONO<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 00 CONCEPT -->\n      <section id=\"concept\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 00 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">The <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Concept<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The Prey lives on a phone, but it's played in the street. The interface is not a destination — it's a <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">tactical readout<\u002Fspan> glanced at while running, hiding, and scanning rooftops. Every design decision flows from one idea: this is a surveillance instrument for a manhunt.<\u002Fp>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The visual language borrows from <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">night-vision optics, GPS trackers, and field-radio comms<\u002Fspan>: phosphor green burning against dead grey, typewriter stencils, monospace telemetry, and targeting reticles. It should feel covert, urgent, and a little dangerous.<\u002Fp>\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Design Principles<\u002Fh3>\n        <sc-for list=\"{{ principles }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:38px 1fr;gap:16px;padding:18px 0;border-bottom:1px solid #2a2f24;\">\n            <div style=\"font-family:'Special Elite',monospace;font-size:22px;color:#3f9e00;\">{{ p.num }}<\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#dcf6d2;margin-bottom:4px;\">{{ p.title }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#8c9a83;max-width:62ch;\">{{ p.body }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n\n      <!-- 01 COLOR -->\n      <section id=\"color\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 01 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Color <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">System<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">A dark, desaturated grey base lets the signal green and threat red read as pure light sources. Greens carry a faint warmth; greys carry a faint green tint — so the whole instrument feels unified under one phosphor.<\u002Fp>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Surfaces<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;\">\n          <sc-for list=\"{{ surfaces }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;background:#23271f;\">\n              <div style=\"height:84px;background:{{ c.bg }};\"><\u002Fdiv>\n              <div style=\"padding:10px 12px;\"><div style=\"font-size:12px;color:#dcf6d2;letter-spacing:.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px;color:#5a6553;text-transform:uppercase;margin-top:3px;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:10px;color:#8c9a83;margin-top:6px;line-height:1.4;\">{{ c.role }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Signal — The Hero Green<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;\">\n          <sc-for list=\"{{ signals }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;background:#23271f;\">\n              <div style=\"height:84px;background:{{ c.bg }};box-shadow:inset 0 0 30px rgba(0,0,0,.2);\"><\u002Fdiv>\n              <div style=\"padding:10px 12px;\"><div style=\"font-size:12px;color:#dcf6d2;letter-spacing:.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px;color:#5a6553;text-transform:uppercase;margin-top:3px;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:10px;color:#8c9a83;margin-top:6px;line-height:1.4;\">{{ c.role }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Roles &amp; States<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;\">\n          <sc-for list=\"{{ roles }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;background:#23271f;\">\n              <div style=\"height:84px;background:{{ c.bg }};\"><\u002Fdiv>\n              <div style=\"padding:10px 12px;\"><div style=\"font-size:12px;color:#dcf6d2;letter-spacing:.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px;color:#5a6553;text-transform:uppercase;margin-top:3px;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:10px;color:#8c9a83;margin-top:6px;line-height:1.4;\">{{ c.role }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Text<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;\">\n          <sc-for list=\"{{ texts }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;background:#23271f;\">\n              <div style=\"height:84px;background:{{ c.bg }};\"><\u002Fdiv>\n              <div style=\"padding:10px 12px;\"><div style=\"font-size:12px;color:#dcf6d2;letter-spacing:.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px;color:#5a6553;text-transform:uppercase;margin-top:3px;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:10px;color:#8c9a83;margin-top:6px;line-height:1.4;\">{{ c.role }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <p style=\"font-size:12px;color:#5a6553;border-top:1px dashed #39402f;padding-top:16px;margin-top:34px;letter-spacing:.5px;max-width:68ch;\">CONTRAST // Signal #64FF00 on Base #181B17 ≈ 13:1 — well above WCAG AAA for large text. Never place Signal green text on the Signal green fill; use Void (#0C0E0C) for text on green buttons.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 02 TYPE -->\n      <section id=\"type\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 02 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Typography<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Two faces, two jobs. <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Special Elite<\u002Fspan> — a battered typewriter face — stamps every heading and key readout with the texture of a printed dossier. <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">PT Mono<\u002Fspan> handles all running text and data; its even rhythm reads like telemetry and keeps numbers aligned.<\u002Fp>\n\n        <div style=\"border:1px solid #39402f;background:#0c0e0c;padding:32px;margin-bottom:20px;position:relative;\">\n          <span style=\"position:absolute;top:12px;right:16px;font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Display — Headings<\u002Fspan>\n          <div style=\"font-family:'Special Elite',monospace;font-size:46px;color:#dcf6d2;line-height:1;\">Special Elite<\u002Fdiv>\n          <div style=\"font-family:'Special Elite',monospace;font-size:22px;color:#8c9a83;margin-top:16px;letter-spacing:1px;\">ABCDEFGHIJKLM 0123456789 &amp; ?!<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #39402f;background:#0c0e0c;padding:32px;margin-bottom:20px;position:relative;\">\n          <span style=\"position:absolute;top:12px;right:16px;font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Body — Running text &amp; data<\u002Fspan>\n          <div style=\"font-family:'PT Mono',monospace;font-size:46px;color:#dcf6d2;line-height:1;\">PT Mono<\u002Fdiv>\n          <div style=\"font-family:'PT Mono',monospace;font-size:22px;color:#8c9a83;margin-top:16px;letter-spacing:1px;\">abcdefghijklm 0123456789 &amp; ?!<\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Type Scale<\u002Fh3>\n        <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;\">\n          <sc-for list=\"{{ typeScale }}\" as=\"t\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid;grid-template-columns:120px 90px 1fr;align-items:baseline;padding:14px 18px;border-bottom:1px solid #2a2f24;gap:16px;\">\n              <span style=\"font-size:11px;color:#3f9e00;letter-spacing:1px;text-transform:uppercase;\">{{ t.tk }}<\u002Fspan>\n              <span style=\"font-size:11px;color:#5a6553;\">{{ t.px }}<\u002Fspan>\n              <span style=\"color:#dcf6d2;font-family:{{ t.font }};font-size:{{ t.size }};letter-spacing:{{ t.ls }};color:{{ t.color }};\">{{ t.ex }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Rules<\u002Fh3>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">· Headings &amp; numeric readouts in Special Elite. · Everything else in PT Mono. · Labels are UPPERCASE PT Mono with <span style=\"background:#0c0e0c;color:#64ff00;padding:1px 7px;border:1px solid #39402f;border-radius:3px;font-size:13px;\">letter-spacing: 2px<\u002Fspan>. · Special Elite has no bold weight — create emphasis with size and color, never faux-bold. · Keep line length under ~68 characters for body copy.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 03 SPACE -->\n      <section id=\"space\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 03 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Space &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Tokens<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">A 4-point base keeps spacing predictable across the dense HUD and the airy menus. Corners are nearly square — a 3px radius reads as \"instrument,\" not \"consumer toy.\"<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n          <div style=\"border:1px solid #39402f;\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 16px;border-bottom:1px solid #2a2f24;font-family:'Special Elite',monospace;font-size:11px;letter-spacing:1.5px;color:#3f9e00;text-transform:uppercase;\"><span>Token<\u002Fspan><span>Value<\u002Fspan><span><\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ spaceTokens }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;padding:11px 16px;border-bottom:1px solid #2a2f24;font-size:13px;\"><span style=\"color:#64ff00;\">{{ s.name }}<\u002Fspan><span style=\"color:#8c9a83;\">{{ s.val }}<\u002Fspan><span style=\"display:inline-block;background:#1f4d00;height:10px;border-radius:1px;width:{{ s.w }};\"><\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #39402f;\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1.4fr;padding:11px 16px;border-bottom:1px solid #2a2f24;font-family:'Special Elite',monospace;font-size:11px;letter-spacing:1.5px;color:#3f9e00;text-transform:uppercase;\"><span>Token<\u002Fspan><span>Value<\u002Fspan><span>Use<\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ shapeTokens }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1.4fr;align-items:center;padding:11px 16px;border-bottom:1px solid #2a2f24;font-size:13px;\"><span style=\"color:#64ff00;\">{{ s.name }}<\u002Fspan><span style=\"color:#8c9a83;\">{{ s.val }}<\u002Fspan><span style=\"color:#8c9a83;\">{{ s.use }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 04 MOTION -->\n      <section id=\"motion\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 04 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Motion<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Motion mimics live instruments: a steady radar sweep, a pulse on every new ping, a brief glow-flare when a primary action fires. Avoid bouncy, playful easing — everything is mechanical and purposeful.<\u002Fp>\n        <div style=\"border:1px solid #39402f;overflow:hidden;\">\n          <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1.4fr;padding:11px 16px;border-bottom:1px solid #2a2f24;font-family:'Special Elite',monospace;font-size:11px;letter-spacing:1.5px;color:#3f9e00;text-transform:uppercase;\"><span>Motion<\u002Fspan><span>Duration<\u002Fspan><span>Easing<\u002Fspan><span>Trigger<\u002Fspan><\u002Fdiv>\n          <sc-for list=\"{{ motion }}\" as=\"m\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1.4fr;align-items:center;padding:11px 16px;border-bottom:1px solid #2a2f24;font-size:13px;\"><span style=\"color:#dcf6d2;\">{{ m.name }}<\u002Fspan><span style=\"color:#8c9a83;\">{{ m.dur }}<\u002Fspan><span style=\"color:#64ff00;\">{{ m.ease }}<\u002Fspan><span style=\"color:#8c9a83;\">{{ m.trig }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-size:12px;color:#5a6553;border-top:1px dashed #39402f;padding-top:16px;margin-top:34px;letter-spacing:.5px;max-width:68ch;\">ACCESSIBILITY // Honor reduced-motion: freeze the radar sweep and replace pulses with a static halo when the OS requests it.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 05 VOICE -->\n      <section id=\"voice\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 05 — Foundations<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Voice &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Tone<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The app speaks like field comms: clipped, present-tense, second-person, no fluff. Imperatives over explanations. It addresses the player as an operative, never as a \"user.\"<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n          <div style=\"border:1px solid #1f4d00;background:#23271f;border-radius:3px;padding:28px;\">\n            <div style=\"font-size:10px;letter-spacing:2.5px;color:#3f9e00;text-transform:uppercase;margin-bottom:18px;\">DO<\u002Fdiv>\n            <sc-for list=\"{{ voiceDo }}\" as=\"v\" hint-placeholder-count=\"4\">\n              <div style=\"color:#dcf6d2;line-height:2;\">{{ v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #a01408;background:#23271f;border-radius:3px;padding:28px;\">\n            <div style=\"font-size:10px;letter-spacing:2.5px;color:#ff2f1f;text-transform:uppercase;margin-bottom:18px;\">DON'T<\u002Fdiv>\n            <sc-for list=\"{{ voiceDont }}\" as=\"v\" hint-placeholder-count=\"4\">\n              <div style=\"color:#8c9a83;line-height:2;\">{{ v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 06 BUTTONS -->\n      <section id=\"buttons\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 06 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Buttons<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Primary actions wear solid signal green with a glow on press — the single brightest element on screen. Hunter-side destructive actions (declare, tag, eliminate) use threat red. All button labels are Special Elite, uppercase.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;display:flex;justify-content:space-between;\"><span>VARIANTS<\u002Fspan><span>hover / tap states<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:14px;align-items:center;\">\n            <button style=\"font-family:'Special Elite',monospace;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px 26px;border-radius:3px;border:1px solid #64ff00;background:#64ff00;color:#0c0e0c;cursor:pointer;transition:.18s;\" style-hover=\"box-shadow:0 0 24px rgba(100,255,0,.35);\">Start Hunt<\u002Fbutton>\n            <button style=\"font-family:'Special Elite',monospace;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px 26px;border-radius:3px;border:1px solid #64ff00;background:transparent;color:#64ff00;cursor:pointer;transition:.18s;\" style-hover=\"background:rgba(100,255,0,.08);box-shadow:0 0 16px rgba(100,255,0,.35);\">Hide Now<\u002Fbutton>\n            <button style=\"font-family:'Special Elite',monospace;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px 26px;border-radius:3px;border:1px solid #ff2f1f;background:transparent;color:#ff2f1f;cursor:pointer;transition:.18s;\" style-hover=\"background:#ff2f1f;color:#fff;box-shadow:0 0 22px rgba(255,47,31,.4);\">Tag Prey<\u002Fbutton>\n            <button disabled=\"\" style=\"font-family:'Special Elite',monospace;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px 26px;border-radius:3px;border:1px solid #39402f;background:transparent;color:#5a6553;cursor:not-allowed;opacity:.6;\">Locked<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"max-width:68ch;color:#8c9a83;\">· <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Primary<\u002Fspan> — one per screen, the main objective. · <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Ghost<\u002Fspan> — secondary, outlined. · <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Hunter<\u002Fspan> — irreversible / hostile actions only. · <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Disabled<\u002Fspan> — line border, ghost text, no glow.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 07 STATUS & ROLES -->\n      <section id=\"status\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 07 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Status &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Roles<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Live status reads through a pulsing pill. Player identity reads through a card with a colored role bar — green for Prey, red for Hunter — so a roster scans instantly even in motion.<\u002Fp>\n\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;\">STATUS PILLS<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:14px;align-items:center;\">\n            <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid #64ff00;color:#64ff00;display:inline-flex;align-items:center;gap:7px;animation:pillPulse 1.5s ease-in-out infinite;\"><span style=\"width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;\"><\u002Fspan>Hidden<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid #ff2f1f;color:#ff2f1f;display:inline-flex;align-items:center;gap:7px;animation:pillPulse 1.5s ease-in-out infinite;\"><span style=\"width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;\"><\u002Fspan>Hunting<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid #ffb300;color:#ffb300;display:inline-flex;align-items:center;gap:7px;animation:pillPulse 1.5s ease-in-out infinite;\"><span style=\"width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;\"><\u002Fspan>Spotted<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid #39402f;color:#5a6553;display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:currentColor;\"><\u002Fspan>Tagged<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;display:flex;justify-content:space-between;\"><span>PLAYER CARDS<\u002Fspan><span>roster<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <div style=\"border:1px solid #39402f;background:#0c0e0c;border-radius:3px;padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;\">\n              <span style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:#64ff00;box-shadow:0 0 12px rgba(100,255,0,.35);\"><\u002Fspan>\n              <div style=\"width:46px;height:46px;border:1px solid #39402f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Special Elite',monospace;font-size:18px;color:#64ff00;flex:0 0 auto;\">P<\u002Fdiv>\n              <div><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#dcf6d2;\">GHOST_07<\u002Fdiv><div style=\"font-size:11px;color:#8c9a83;letter-spacing:1px;margin-top:2px;\">PREY · HIDDEN<\u002Fdiv><\u002Fdiv>\n              <div style=\"margin-left:auto;text-align:right;\"><div style=\"font-family:'Special Elite',monospace;font-size:18px;color:#dcf6d2;\">312<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;letter-spacing:1px;\">M AWAY<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #39402f;background:#0c0e0c;border-radius:3px;padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;\">\n              <span style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:#ff2f1f;box-shadow:0 0 12px rgba(255,47,31,.4);\"><\u002Fspan>\n              <div style=\"width:46px;height:46px;border:1px solid #39402f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Special Elite',monospace;font-size:18px;color:#ff2f1f;flex:0 0 auto;\">H<\u002Fdiv>\n              <div><div style=\"font-family:'Special Elite',monospace;font-size:15px;color:#dcf6d2;\">REAPER<\u002Fdiv><div style=\"font-size:11px;color:#8c9a83;letter-spacing:1px;margin-top:2px;\">HUNTER · CLOSING IN<\u002Fdiv><\u002Fdiv>\n              <div style=\"margin-left:auto;text-align:right;\"><div style=\"font-family:'Special Elite',monospace;font-size:18px;color:#dcf6d2;\">48<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;letter-spacing:1px;\">M AWAY<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 08 INPUTS -->\n      <section id=\"inputs\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 08 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Inputs<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Fields are dark insets with a hairline border that lights up green on focus. Labels sit above in spaced uppercase. Used mostly for lobby setup: callsign, room code, playfield radius.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;\">TEXT FIELD<\u002Fdiv>\n          <div style=\"max-width:380px;\">\n            <div style=\"margin-bottom:18px;\">\n              <label style=\"display:block;font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:8px;\">Callsign<\u002Flabel>\n              <input type=\"text\" value=\"GHOST_07\" style=\"width:100%;background:#0c0e0c;border:1px solid #39402f;color:#dcf6d2;font-family:'PT Mono',monospace;font-size:14px;padding:12px 14px;border-radius:3px;outline:none;transition:.18s;\" style-focus=\"border:1px solid #64ff00;box-shadow:0 0 0 1px #64ff00, 0 0 18px rgba(100,255,0,.35);\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:10px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:8px;\">Room Code<\u002Flabel>\n              <input type=\"text\" placeholder=\"6-digit code\" style=\"width:100%;background:#0c0e0c;border:1px solid #39402f;color:#dcf6d2;font-family:'PT Mono',monospace;font-size:14px;padding:12px 14px;border-radius:3px;outline:none;transition:.18s;\" style-focus=\"border:1px solid #64ff00;box-shadow:0 0 0 1px #64ff00, 0 0 18px rgba(100,255,0,.35);\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 09 ALERTS -->\n      <section id=\"alerts\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 09 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Alerts<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">System events arrive as left-bordered banners color-coded to urgency. Reserve danger red for genuine threats — a hunter inside your radius, or being tagged.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"border-left:3px solid #ff2f1f;padding:14px 18px;background:#0c0e0c;border-radius:0 3px 3px 0;display:flex;gap:12px;align-items:flex-start;\"><div style=\"font-family:'Special Elite',monospace;font-size:16px;line-height:1.3;color:#ff2f1f;\">!<\u002Fdiv><div><div style=\"font-family:'Special Elite',monospace;font-size:13px;letter-spacing:.5px;color:#ff2f1f;\">HUNTER NEARBY<\u002Fdiv><div style=\"font-size:12.5px;color:#8c9a83;margin-top:2px;\">REAPER is 48m from your position. Break line of sight.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"border-left:3px solid #ffb300;padding:14px 18px;background:#0c0e0c;border-radius:0 3px 3px 0;display:flex;gap:12px;align-items:flex-start;\"><div style=\"font-family:'Special Elite',monospace;font-size:16px;line-height:1.3;color:#ffb300;\">▲<\u002Fdiv><div><div style=\"font-family:'Special Elite',monospace;font-size:13px;letter-spacing:.5px;color:#ffb300;\">APPROACHING BOUNDARY<\u002Fdiv><div style=\"font-size:12.5px;color:#8c9a83;margin-top:2px;\">You are 30m from the playfield edge. Turn back.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"border-left:3px solid #64ff00;padding:14px 18px;background:#0c0e0c;border-radius:0 3px 3px 0;display:flex;gap:12px;align-items:flex-start;\"><div style=\"font-family:'Special Elite',monospace;font-size:16px;line-height:1.3;color:#64ff00;\">✓<\u002Fdiv><div><div style=\"font-family:'Special Elite',monospace;font-size:13px;letter-spacing:.5px;color:#64ff00;\">SIGNAL LOCKED<\u002Fdiv><div style=\"font-size:12.5px;color:#8c9a83;margin-top:2px;\">GPS fix acquired. You are now hidden.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 10 CONTROLS -->\n      <section id=\"controls\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 10 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\"><span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Controls<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Lobby and settings use three control types. All are dark-on-dark with a green-lit active state — every control is a switch on an instrument panel, never a soft consumer toggle. <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Try them.<\u002Fspan><\u002Fp>\n\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:32px;\">\n          <div>\n            <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:16px;\">SEGMENTED — ROLE SELECT<\u002Fdiv>\n            <div style=\"display:flex;border:1px solid #39402f;border-radius:3px;overflow:hidden;max-width:260px;\">\n              <sc-if value=\"{{ segPrey }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ setPrey }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border:0;background:#64ff00;color:#0c0e0c;cursor:pointer;\">Prey<\u002Fbutton><\u002Fsc-if>\n              <sc-if value=\"{{ segHunter }}\"><button onclick=\"{{ setPrey }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border:0;background:transparent;color:#8c9a83;cursor:pointer;\">Prey<\u002Fbutton><\u002Fsc-if>\n              <sc-if value=\"{{ segHunter }}\"><button onclick=\"{{ setHunter }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border:0;border-left:1px solid #39402f;background:#ff2f1f;color:#fff;cursor:pointer;\">Hunter<\u002Fbutton><\u002Fsc-if>\n              <sc-if value=\"{{ segPrey }}\"><button onclick=\"{{ setHunter }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border:0;border-left:1px solid #39402f;background:transparent;color:#8c9a83;cursor:pointer;\">Hunter<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;color:#5a6553;margin-top:12px;letter-spacing:.5px;\">Two states only. Active segment fills with its role color; the rest stay ghost.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:16px;\">TOGGLES — MATCH SETTINGS<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px;max-width:300px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"font-size:13px;color:#dcf6d2;\">Sound cues<\u002Fspan>\n                <sc-if value=\"{{ swSound }}\" hint-placeholder-val=\"{{ true }}\"><div onclick=\"{{ toggleSound }}\" style=\"display:flex;align-items:center;justify-content:flex-end;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#1f4d00;border:1px solid #3f9e00;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#64ff00;box-shadow:0 0 8px rgba(100,255,0,.35);\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ swSoundOff }}\"><div onclick=\"{{ toggleSound }}\" style=\"display:flex;align-items:center;justify-content:flex-start;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#23271f;border:1px solid #39402f;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#5a6553;\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"font-size:13px;color:#dcf6d2;\">Vibrate on ping<\u002Fspan>\n                <sc-if value=\"{{ swVibrate }}\"><div onclick=\"{{ toggleVibrate }}\" style=\"display:flex;align-items:center;justify-content:flex-end;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#1f4d00;border:1px solid #3f9e00;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#64ff00;box-shadow:0 0 8px rgba(100,255,0,.35);\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ swVibrateOff }}\" hint-placeholder-val=\"{{ true }}\"><div onclick=\"{{ toggleVibrate }}\" style=\"display:flex;align-items:center;justify-content:flex-start;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#23271f;border:1px solid #39402f;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#5a6553;\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"font-size:13px;color:#dcf6d2;\">Ghost mode<\u002Fspan>\n                <sc-if value=\"{{ swGhost }}\" hint-placeholder-val=\"{{ true }}\"><div onclick=\"{{ toggleGhost }}\" style=\"display:flex;align-items:center;justify-content:flex-end;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#1f4d00;border:1px solid #3f9e00;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#64ff00;box-shadow:0 0 8px rgba(100,255,0,.35);\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ swGhostOff }}\"><div onclick=\"{{ toggleGhost }}\" style=\"display:flex;align-items:center;justify-content:flex-start;width:46px;height:24px;border-radius:999px;padding:3px;cursor:pointer;background:#23271f;border:1px solid #39402f;\"><span style=\"width:16px;height:16px;border-radius:50%;background:#5a6553;\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"grid-column:1 / -1;\">\n            <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:16px;\">SLIDER — PLAYFIELD RADIUS<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:20px;max-width:520px;\">\n              <input type=\"range\" min=\"100\" max=\"1000\" step=\"50\" value=\"{{ radius }}\" oninput=\"{{ setRadius }}\" style=\"flex:1;accent-color:#64ff00;height:4px;cursor:pointer;\">\n              <div style=\"font-family:'Special Elite',monospace;font-size:24px;color:#64ff00;text-shadow:0 0 12px rgba(100,255,0,.35);min-width:120px;text-align:right;\">{{ radius }}<span style=\"font-size:13px;color:#8c9a83;margin-left:4px;\">M<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;color:#5a6553;margin-top:12px;letter-spacing:.5px;\">Native range, signal-green accent. The live value renders in Special Elite — the same readout treatment used across the HUD.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 11 MODALS -->\n      <section id=\"modals\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 11 — Components<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Modals &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Dialogs<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Irreversible actions confirm in a dialog. It darkens the playfield behind a dim scrim, frames the choice in corner brackets, and forces a deliberate second tap. The destructive option is always hunter red; cancel is always the easy out. <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Tap \"Tag Player\" to open it.<\u002Fspan><\u002Fp>\n        <div style=\"position:relative;border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;min-height:360px;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n          <button onclick=\"{{ openModal }}\" style=\"font-family:'Special Elite',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:11px 20px;border-radius:3px;border:1px solid #a01408;background:rgba(255,47,31,.08);color:#ff2f1f;cursor:pointer;display:inline-flex;align-items:center;gap:8px;\">◎ Tag Player<\u002Fbutton>\n\n          <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;inset:0;background:rgba(8,6,6,.78);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:20;\">\n              <div style=\"position:relative;width:320px;border:1px solid #a01408;background:#0c0e0c;border-radius:3px;padding:26px 24px 22px;box-shadow:0 24px 70px rgba(0,0,0,.7);\">\n                <span style=\"position:absolute;top:8px;left:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-right:0;border-bottom:0;\"><\u002Fspan>\n                <span style=\"position:absolute;top:8px;right:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-left:0;border-bottom:0;\"><\u002Fspan>\n                <span style=\"position:absolute;bottom:8px;left:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-right:0;border-top:0;\"><\u002Fspan>\n                <span style=\"position:absolute;bottom:8px;right:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-left:0;border-top:0;\"><\u002Fspan>\n                <div style=\"font-size:10px;letter-spacing:2.5px;color:#a01408;text-transform:uppercase;margin-bottom:14px;\">Confirm Tag — Irreversible<\u002Fdiv>\n                <div style=\"font-family:'Special Elite',monospace;font-size:20px;color:#dcf6d2;margin-bottom:6px;\">Tag GHOST_07?<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#8c9a83;line-height:1.6;margin-bottom:20px;\">They are 22 m away and in range. This eliminates the prey and cannot be undone.<\u002Fdiv>\n                <div style=\"display:flex;gap:10px;\">\n                  <button onclick=\"{{ closeModal }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border-radius:3px;border:1px solid #39402f;background:transparent;color:#8c9a83;cursor:pointer;\">Cancel<\u002Fbutton>\n                  <button onclick=\"{{ closeModal }}\" style=\"flex:1;font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;border-radius:3px;border:1px solid #ff2f1f;background:#ff2f1f;color:#fff;cursor:pointer;\">Confirm Tag<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <p style=\"max-width:68ch;color:#8c9a83;\">· Scrim dims to ~78% void. · Corner brackets adopt the action's color (red for destructive, green for confirmations). · Title in Special Elite, body in PT Mono. · The safe action sits left; the committed action sits right and carries the only filled button.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 12 RADAR -->\n      <section id=\"radar\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 12 — Game UI<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Radar <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Sweep<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The radar is the signature widget — a phosphor sweep over a dead-grey field, with you locked at center, prey pinging green, hunters burning red.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;display:flex;justify-content:space-between;\"><span>RADAR<\u002Fspan><span>live sweep — 3.4s<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:36px;align-items:center;flex-wrap:wrap;\">\n            <div style=\"width:220px;height:220px;border-radius:50%;position:relative;border:1px solid #1f4d00;background:radial-gradient(circle, rgba(100,255,0,.05), transparent 70%), #0c0e0c;overflow:hidden;\">\n              <div style=\"position:absolute;border:1px solid #1f4d00;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);width:33%;height:33%;\"><\u002Fdiv>\n              <div style=\"position:absolute;border:1px solid #1f4d00;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);width:66%;height:66%;\"><\u002Fdiv>\n              <div style=\"position:absolute;background:#1f4d00;left:0;right:0;top:50%;height:1px;\"><\u002Fdiv>\n              <div style=\"position:absolute;background:#1f4d00;top:0;bottom:0;left:50%;width:1px;\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg, rgba(100,255,0,.35), transparent 28%);animation:spin 3.4s linear infinite;\"><\u002Fdiv>\n              <div style=\"position:absolute;top:50%;left:50%;width:12px;height:12px;transform:translate(-50%,-50%);border:2px solid #64ff00;border-radius:50%;\"><\u002Fdiv>\n              <div style=\"position:absolute;width:9px;height:9px;border-radius:50%;background:#64ff00;box-shadow:0 0 12px #64ff00;top:38%;left:62%;transform:translate(-50%,-50%);animation:blipPing 2s ease-out infinite;\"><\u002Fdiv>\n              <div style=\"position:absolute;width:9px;height:9px;border-radius:50%;background:#ff2f1f;box-shadow:0 0 12px #ff2f1f;top:64%;left:40%;transform:translate(-50%,-50%);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:#8c9a83;line-height:1.9;\"><span style=\"color:#dcf6d2;\">Center<\u002Fspan> — you (green ring).<br><span style=\"color:#dcf6d2;\">Green ping<\u002Fspan> — known prey.<br><span style=\"color:#dcf6d2;\">Red dot<\u002Fspan> — hunter in range.<br><span style=\"color:#dcf6d2;\">Grid<\u002Fspan> — Signal Deep, recedes.<br><span style=\"color:#dcf6d2;\">Sweep<\u002Fspan> — 3.4s rotation, conic green fade.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 13 HUD PANEL -->\n      <section id=\"hud\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 13 — Game UI<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">HUD <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Panel<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The HUD pins the vitals a player checks constantly. It collapses to a single bar — game time and the next-update countdown — and expands to the full readout on tap. <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">Tap it to toggle.<\u002Fspan><\u002Fp>\n\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;\">\n          <div style=\"font-size:10px;letter-spacing:2.5px;color:#5a6553;text-transform:uppercase;margin-bottom:20px;display:flex;justify-content:space-between;\"><span>COLLAPSIBLE HUD<\u002Fspan><span>interactive<\u002Fspan><\u002Fdiv>\n          <div style=\"max-width:340px;background:#0c0e0c;border:1px solid #39402f;border-radius:3px;overflow:hidden;\">\n            <sc-if value=\"{{ hudCollapsed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ toggleHud }}\" style=\"display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;\">\n                <span style=\"font-size:8px;color:#5a6553;width:12px;transform:rotate(180deg);\">▼<\u002Fspan>\n                <span style=\"font-family:'Special Elite',monospace;font-size:18px;color:#64ff00;text-shadow:0 0 8px rgba(100,255,0,.35);min-width:52px;\">09:37<\u002Fspan>\n                <div style=\"flex:1;height:4px;background:#39402f;border-radius:2px;overflow:hidden;\"><div style=\"height:100%;width:62%;background:#64ff00;box-shadow:0 0 6px rgba(100,255,0,.35);border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"font-family:'Special Elite',monospace;font-size:16px;color:#5a6553;min-width:40px;text-align:right;\">00:19<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hudExpanded }}\">\n              <div style=\"padding:14px 16px 10px;\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;border:1px solid #39402f;border-radius:3px;overflow:hidden;margin-bottom:10px;\">\n                  <div style=\"background:rgba(12,14,12,.7);padding:10px 12px;border-right:1px solid #39402f;\"><div style=\"font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:5px;\">Game time<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:22px;line-height:1;color:#64ff00;text-shadow:0 0 12px rgba(100,255,0,.35);\">09:37<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:3px;\">remaining<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:rgba(12,14,12,.7);padding:10px 12px;border-right:1px solid #39402f;\"><div style=\"font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:5px;\">Hunter<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:22px;line-height:1;color:#64ff00;text-shadow:0 0 12px rgba(100,255,0,.35);\">147<span style=\"font-size:13px;margin-left:3px;\">M<\u002Fspan><\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:3px;\">14s ago<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:rgba(12,14,12,.7);padding:10px 12px;\"><div style=\"font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;margin-bottom:5px;\">Preys<\u002Fdiv><div style=\"font-family:'Special Elite',monospace;font-size:22px;line-height:1;color:#64ff00;text-shadow:0 0 12px rgba(100,255,0,.35);\">3<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:3px;\">active<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;border:1px solid #39402f;border-radius:3px;background:rgba(12,14,12,.7);padding:9px 14px;\">\n                  <div style=\"font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;flex:1;\">Next Ping<\u002Fdiv>\n                  <div style=\"flex:1;height:4px;background:#39402f;border-radius:2px;overflow:hidden;\"><div style=\"height:100%;width:62%;background:#64ff00;box-shadow:0 0 6px rgba(100,255,0,.35);border-radius:2px;\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-family:'Special Elite',monospace;font-size:18px;color:#64ff00;text-shadow:0 0 8px rgba(100,255,0,.35);min-width:44px;text-align:right;\">00:19<\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ toggleHud }}\" style=\"display:flex;align-items:center;justify-content:center;padding:8px 0 2px;cursor:pointer;color:#5a6553;font-size:9px;letter-spacing:2px;text-transform:uppercase;gap:6px;margin-top:6px;\">▼ hide<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#5a6553;margin-top:14px;letter-spacing:.5px;max-width:340px;\">Cells: <span style=\"color:#8c9a83;\">Game Time<\u002Fspan>, <span style=\"color:#8c9a83;\">nearest threat distance<\u002Fspan>, <span style=\"color:#8c9a83;\">Active Preys<\u002Fspan>. The full-width strip below counts down to the next position broadcast — bar and value adopt the current threat color.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 14 STATUS BAR -->\n      <section id=\"statusbar\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 14 — Game UI<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Status <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Bar<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The top strip floats over the map with a gradient fade. Corner brackets and the role tag carry the player's identity color; the pill shows live state. When threat rises, all four corners shift color at once — the whole frame signals the change.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;display:flex;flex-direction:column;gap:18px;\">\n          <div style=\"position:relative;height:54px;background:#0c0e0c;border:1px solid #39402f;border-radius:3px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;overflow:hidden;\">\n            <span style=\"position:absolute;top:8px;left:8px;width:14px;height:14px;border:1.5px solid #64ff00;border-right:0;border-bottom:0;\"><\u002Fspan>\n            <span style=\"position:absolute;top:8px;right:8px;width:14px;height:14px;border:1.5px solid #64ff00;border-left:0;border-bottom:0;\"><\u002Fspan>\n            <span style=\"font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid #64ff00;color:#64ff00;display:inline-flex;align-items:center;gap:6px;animation:pillPulse 1.5s ease-in-out infinite;\"><span style=\"width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;\"><\u002Fspan>Hidden<\u002Fspan>\n            <span style=\"font-family:'Special Elite',monospace;font-size:11px;color:#64ff00;letter-spacing:1.5px;text-shadow:0 0 8px rgba(100,255,0,.35);\">PREY<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:54px;background:#0c0e0c;border:1px solid #39402f;border-radius:3px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;overflow:hidden;\">\n            <span style=\"position:absolute;top:8px;left:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-right:0;border-bottom:0;\"><\u002Fspan>\n            <span style=\"position:absolute;top:8px;right:8px;width:14px;height:14px;border:1.5px solid #ff2f1f;border-left:0;border-bottom:0;\"><\u002Fspan>\n            <span style=\"font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid #ff2f1f;color:#ff2f1f;display:inline-flex;align-items:center;gap:6px;animation:pillPulse 1.5s ease-in-out infinite;\"><span style=\"width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;\"><\u002Fspan>Hunting<\u002Fspan>\n            <span style=\"font-family:'Special Elite',monospace;font-size:11px;color:#ff2f1f;letter-spacing:1.5px;text-shadow:0 0 8px rgba(255,47,31,.4);\">HUNTER<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 15 MAP & DOTS -->\n      <section id=\"map\" style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Section 15 — Game UI<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Map &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Dots<\u002Fspan><\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">The map fills the full screen bleed. A dashed SVG polygon marks the playfield — green-washed for prey, red-washed for hunter. Players render as four distinct dot states.<\u002Fp>\n        <div style=\"border:1px solid #39402f;background:#23271f;border-radius:3px;padding:28px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n\n          <div style=\"position:relative;height:220px;border:1px solid #39402f;border-radius:3px;overflow:hidden;background:linear-gradient(rgba(39,46,31,.4) 1px, transparent 1px), linear-gradient(90deg, rgba(39,46,31,.4) 1px, transparent 1px), radial-gradient(ellipse 60% 60% at 50% 50%, rgba(100,255,0,.05), transparent 70%), #0e1309;background-size:34px 34px, 34px 34px, 100% 100%, 100%;\">\n            <svg width=\"100%\" height=\"100%\" viewBox=\"0 0 300 220\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;\"><polygon points=\"50,40 250,30 280,110 220,190 70,200 30,120\" fill=\"rgba(100,255,0,.04)\" stroke=\"#3f9e00\" stroke-width=\"1.5\" stroke-dasharray=\"6 3\"><\u002Fpolygon><\u002Fsvg>\n            <div style=\"position:absolute;top:50%;left:52%;transform:translate(-50%,-50%);\"><div style=\"width:14px;height:14px;border-radius:50%;background:#64ff00;box-shadow:0 0 10px rgba(100,255,0,.35),0 0 20px rgba(100,255,0,.35);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;top:31%;left:38%;transform:translate(-50%,-50%);\"><div style=\"width:12px;height:12px;border-radius:50%;background:#ff2f1f;box-shadow:0 0 8px rgba(255,47,31,.4),0 0 18px rgba(255,47,31,.4);animation:preyFlash 1.1s ease-in-out infinite;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;bottom:8px;left:10px;font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Prey view — green wash<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative;height:220px;border:1px solid #39402f;border-radius:3px;overflow:hidden;background:linear-gradient(rgba(46,36,31,.4) 1px, transparent 1px), linear-gradient(90deg, rgba(46,36,31,.4) 1px, transparent 1px), radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,47,31,.05), transparent 70%), #100a09;background-size:34px 34px, 34px 34px, 100% 100%, 100%;\">\n            <svg width=\"100%\" height=\"100%\" viewBox=\"0 0 300 220\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;\"><polygon points=\"50,40 250,30 280,110 220,190 70,200 30,120\" fill=\"rgba(255,47,31,.04)\" stroke=\"#a01408\" stroke-width=\"1.5\" stroke-dasharray=\"6 3\"><\u002Fpolygon><\u002Fsvg>\n            <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);\"><div style=\"width:14px;height:14px;border-radius:50%;background:#64ff00;box-shadow:0 0 10px rgba(100,255,0,.35),0 0 20px rgba(100,255,0,.35);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;top:30%;left:40%;transform:translate(-50%,-50%);\"><div style=\"width:12px;height:12px;border-radius:50%;background:#ff2f1f;box-shadow:0 0 8px rgba(255,47,31,.4),0 0 18px rgba(255,47,31,.4);animation:preyFlash 1.1s ease-in-out infinite;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;top:64%;left:68%;transform:translate(-50%,-50%);\"><div style=\"width:12px;height:12px;border-radius:50%;background:#888;opacity:.6;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;bottom:8px;left:10px;font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\">Hunter view — red wash<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;\">\n          <div style=\"border:1px solid #39402f;border-radius:3px;background:#0c0e0c;padding:18px;display:flex;align-items:center;gap:14px;\"><div style=\"width:14px;height:14px;border-radius:50%;background:#64ff00;box-shadow:0 0 10px rgba(100,255,0,.35);flex:0 0 auto;\"><\u002Fdiv><div><div style=\"font-size:12px;color:#dcf6d2;\">Self<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:2px;\">Green, expanding ring<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #39402f;border-radius:3px;background:#0c0e0c;padding:18px;display:flex;align-items:center;gap:14px;\"><div style=\"width:14px;height:14px;border-radius:50%;background:#64ff00;box-shadow:0 0 10px #64ff00;flex:0 0 auto;animation:preyFlash 1.1s ease-in-out infinite;\"><\u002Fdiv><div><div style=\"font-size:12px;color:#dcf6d2;\">Tracked (friendly)<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:2px;\">Green, 1.1s flash<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #39402f;border-radius:3px;background:#0c0e0c;padding:18px;display:flex;align-items:center;gap:14px;\"><div style=\"width:14px;height:14px;border-radius:50%;background:#ff2f1f;box-shadow:0 0 10px #ff2f1f;flex:0 0 auto;animation:preyFlash 1.1s ease-in-out infinite;\"><\u002Fdiv><div><div style=\"font-size:12px;color:#dcf6d2;\">Threat / target<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:2px;\">Red, 1.1s flash<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #39402f;border-radius:3px;background:#0c0e0c;padding:18px;display:flex;align-items:center;gap:14px;\"><div style=\"width:14px;height:14px;border-radius:50%;background:#888;opacity:.6;flex:0 0 auto;\"><\u002Fdiv><div><div style=\"font-size:12px;color:#dcf6d2;\">Tagged / out<\u002Fdiv><div style=\"font-size:10px;color:#5a6553;margin-top:2px;\">Grey, static<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- DISTANCE & TIMER SPEC -->\n      <section style=\"margin-bottom:96px;scroll-margin-top:30px;\">\n        <div style=\"font-size:11px;letter-spacing:3px;color:#3f9e00;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:26px;height:1px;background:#3f9e00;\"><\u002Fspan>Game UI — Threat Logic<\u002Fdiv>\n        <h2 style=\"font-family:'Special Elite',monospace;font-size:34px;color:#dcf6d2;line-height:1.1;margin-bottom:18px;\">Distance &amp; <span style=\"color:#64ff00;text-shadow:0 0 16px rgba(100,255,0,.35);\">Timer<\u002Fspan> States<\u002Fh2>\n        <p style=\"max-width:68ch;margin-bottom:14px;color:#8c9a83;\">Distance is encoded in three discrete colors — no interpolation; the abrupt switch reads faster in motion. The two roles use <span style=\"color:#dcf6d2;border-bottom:1px dotted #3f9e00;\">inverse<\u002Fspan> scales: prey see green as safe (hunter far); hunters see green as winning (prey close).<\u002Fp>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Prey — Hunter Distance<\u002Fh3>\n        <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;max-width:620px;\">\n          <div style=\"display:grid;grid-template-columns:90px 1fr 1.2fr 80px;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2f24;gap:12px;background:#23271f;font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\"><span>Distance<\u002Fspan><span>State<\u002Fspan><span>Token<\u002Fspan><span>Ex.<\u002Fspan><\u002Fdiv>\n          <sc-for list=\"{{ preyThresholds }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid;grid-template-columns:90px 1fr 1.2fr 80px;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2f24;gap:12px;\">\n              <span style=\"font-size:12px;color:#8c9a83;\">{{ t.dist }}<\u002Fspan>\n              <span style=\"font-size:12px;color:#8c9a83;display:inline-flex;align-items:center;gap:8px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:{{ t.sw }};box-shadow:0 0 6px {{ t.glow }};\"><\u002Fspan>{{ t.label }}<\u002Fspan>\n              <span style=\"font-size:11px;color:#5a6553;\">{{ t.token }}<\u002Fspan>\n              <span style=\"font-family:'Special Elite',monospace;font-size:18px;color:{{ t.color }};text-shadow:0 0 10px {{ t.glow }};\">{{ t.ex }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Special Elite',monospace;font-size:19px;color:#64ff00;margin:38px 0 14px;letter-spacing:.5px;\">Hunter — Closest Prey (inverse)<\u002Fh3>\n        <div style=\"border:1px solid #39402f;border-radius:3px;overflow:hidden;max-width:620px;\">\n          <div style=\"display:grid;grid-template-columns:90px 1fr 1.2fr 80px;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2f24;gap:12px;background:#23271f;font-size:9px;letter-spacing:2px;color:#5a6553;text-transform:uppercase;\"><span>Distance<\u002Fspan><span>State<\u002Fspan><span>Token<\u002Fspan><span>Ex.<\u002Fspan><\u002Fdiv>\n          <sc-for list=\"{{ hunterThresholds }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid;grid-template-columns:90px 1fr 1.2fr 80px;align-items:center;padding:12px 16px;border-bottom:1px solid #2a2f24;gap:12px;\">\n              <span style=\"font-size:12px;color:#8c9a83;\">{{ t.dist }}<\u002Fspan>\n              <span style=\"font-size:12px;color:#8c9a83;display:inline-flex;align-items:center;gap:8px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:{{ t.sw }};box-shadow:0 0 6px {{ t.glow }};\"><\u002Fspan>{{ t.label }}<\u002Fspan>\n              <span style=\"font-size:11px;color:#5a6553;\">{{ t.token }}<\u002Fspan>\n              <span style=\"font-family:'Special Elite',monospace;font-size:18px;color:{{ t.color }};text-shadow:0 0 10px {{ t.glow }};\">{{ t.ex }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n
