name: Users

on:
  push:
    branches: [main]
    paths:
      - 'src/Users/**'
      - 'src/Core/**'
      - 'src/Shared/**'
      - 'src/Aspire/ThePrey.Aspire.ServiceDefaults/**'
      - 'infra/users/**'
      - 'infra/modules/**'
      - '.github/workflows/users.yml'
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Image tag override (leave blank to use GitVersion semVer)'
        required: false
        default: ''
  pull_request:
    branches: [main]
    paths:
      - 'src/Users/**'
      - 'src/Core/**'
      - 'src/Shared/**'
      - 'src/Aspire/ThePrey.Aspire.ServiceDefaults/**'
      - 'infra/users/**'
      - 'infra/modules/**'
      - '.github/workflows/users.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: users-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run Users tests
        run: dotnet test src/Users/HexMaster.ThePrey.Users.Tests/HexMaster.ThePrey.Users.Tests.csproj --configuration Release --no-restore

  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [version, test]
    if: github.event_name != 'pull_request'
    outputs:
      imageTag: ${{ steps.resolve-tag.outputs.imageTag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.imageTag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.version.outputs.semVer }}"
          fi
          echo "imageTag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_HOSTNAME }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE="${{ secrets.ACR_HOSTNAME }}/theprey/users-api:${{ steps.resolve-tag.outputs.imageTag }}"
          docker build -f src/Users/HexMaster.ThePrey.Users.Api/Dockerfile -t "$IMAGE" -t "${{ secrets.ACR_HOSTNAME }}/theprey/users-api:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.ACR_HOSTNAME }}/theprey/users-api:latest"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_PROD_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_PROD_TENANTID }}
          subscription-id: ${{ secrets.AZURE_PROD_SUBSCRIPTION }}

      - name: Read landing zone outputs
        id: lz
        run: |
          LZ=$(az deployment sub show --name theprey-lz-prod --query properties.outputs -o json)
          echo "acaEnvName=$(echo $LZ | jq -r '.containerAppsEnvironmentName.value')" >> "$GITHUB_OUTPUT"
          echo "appInsightsName=$(echo $LZ | jq -r '.appInsightsName.value')" >> "$GITHUB_OUTPUT"
          echo "appConfigEndpoint=$(echo $LZ | jq -r '.appConfigEndpoint.value')" >> "$GITHUB_OUTPUT"

      - name: Bicep build (lint)
        run: az bicep build --file infra/users/main.bicep

      - name: Deploy Users
        run: |
          az deployment sub create \
            --name theprey-users-prod \
            --location westeurope \
            --template-file infra/users/main.bicep \
            --parameters \
              imageTag="${{ needs.docker.outputs.imageTag }}" \
              registryServer="${{ secrets.ACR_HOSTNAME }}" \
              registryUsername="${{ secrets.ACR_USERNAME }}" \
              registryPassword="${{ secrets.ACR_PASSWORD }}" \
              acaEnvironmentName="${{ steps.lz.outputs.acaEnvName }}" \
              appInsightsName="${{ steps.lz.outputs.appInsightsName }}" \
              appConfigEndpoint="${{ steps.lz.outputs.appConfigEndpoint }}"
